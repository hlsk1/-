<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>用户评价 - 爱租车</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/business.css">
    <style>
        .review-card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius-lg);padding:1.5rem;transition:box-shadow .2s}
        .review-card:hover{box-shadow:var(--shadow-md)}
        .stars{color:#eab308;font-size:1rem;letter-spacing:2px}
        .stars .empty{color:#d1d5db}
        .review-meta{display:flex;gap:1.5rem;flex-wrap:wrap;font-size:.8125rem;color:var(--muted);margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--line)}
        .review-meta span{display:flex;align-items:center;gap:4px;cursor:default}
        .review-meta .like-btn{cursor:pointer;color:var(--primary);font-weight:600;transition:color .15s}
        .review-meta .like-btn:hover{color:var(--danger)}
        .review-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:1.25rem}
        .review-form-card{background:var(--white);border:2px solid var(--accent);border-radius:var(--radius-lg);padding:1.5rem}
        .star-input{display:flex;gap:4px;font-size:1.5rem;cursor:pointer}
        .star-input i{color:#d1d5db;transition:color .15s}
        .star-input i.active{color:#eab308}
        .empty-state{text-align:center;padding:4rem 2rem;color:var(--muted)}
    </style>
</head>
<body>
<header class="navbar">
    <a href="home.html" class="brand"><span class="dot"></span>爱租车</a>
    <nav>
        <a href="home.html">首页</a><a href="home.html#fleet">车型</a><a href="reviews.html">评价</a>
        <a href="about.html">关于</a><a href="contact.html">联系</a>
        <a href="login.html" class="btn-sm btn-outline">登录</a>
    </nav>
</header>

<section class="page-hero"><div class="container">
    <div class="section-label">Customer Reviews</div>
    <h1>用户真实评价</h1><p>来自租车客户的真实用车体验分享</p>
</div></section>

<section class="section"><div class="container">
    <div id="reviewContent"><div class="empty-state"><i class="fas fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:.5rem;"></i>加载中...</div></div>
</div></section>

<!-- 写评价弹窗 -->
<div class="modal-overlay" id="reviewOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(3px)">
    <div class="modal" style="background:#fff;border-radius:14px;padding:1.5rem;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 40px rgba(0,0,0,.15)">
        <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem"><h3>✍️ 写评价</h3><button class="modal-close" onclick="closeReviewModal()" style="background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--muted)">&times;</button></div>
        <form id="reviewForm">
            <input type="hidden" id="rvOrderId"><input type="hidden" id="rvVehicleId">
            <div class="form-group"><label class="form-label">订单号</label><input class="form-input" id="rvOrderNo" readonly style="background:var(--surface)"></div>
            <div class="form-group"><label class="form-label">车辆</label><input class="form-input" id="rvVehicle" readonly style="background:var(--surface)"></div>
            <div class="form-group"><label class="form-label">评分 <span style="color:red">*</span></label>
                <div class="star-input" id="starInput">
                    <i class="fas fa-star" data-v="1"></i><i class="fas fa-star" data-v="2"></i><i class="fas fa-star" data-v="3"></i><i class="fas fa-star" data-v="4"></i><i class="fas fa-star" data-v="5"></i>
                </div>
            </div>
            <div class="form-group"><label class="form-label">评价内容 <span style="color:red">*</span></label><textarea class="form-textarea" id="rvContent" rows="4" placeholder="分享您的用车体验..."></textarea></div>
            <div class="form-actions" style="display:flex;justify-content:flex-end;gap:.5rem"><button type="button" class="btn btn-outline" onclick="closeReviewModal()">取消</button><button type="submit" class="btn btn-primary">提交评价</button></div>
        </form>
    </div>
</div>

<footer class="footer"><div class="container"><div class="footer-grid">
    <div><div style="font-size:1.125rem;font-weight:800;color:#fff;margin-bottom:.5rem;"><span style="color:var(--accent);">●</span> 爱租车</div><p>专业汽车租赁服务平台</p></div>
    <div><h4>快速链接</h4><a href="home.html">首页</a><a href="about.html">关于我们</a><a href="contact.html">联系我们</a></div>
    <div><h4>服务支持</h4><a href="#">租车须知</a><a href="#">保险说明</a><a href="#">违章处理</a></div>
    <div><h4>联系方式</h4><a>400-888-6688</a><a>service@aizuche.com</a><a>广州市天河区</a></div>
</div><div class="footer-bottom">© 2026 爱租车汽车租赁服务平台</div></div></footer>

<script>
var API='',_rating=0;
function closeReviewModal(){document.getElementById('reviewOverlay').style.display='none'}
document.getElementById('reviewOverlay').addEventListener('click',function(e){if(e.target===this)closeReviewModal()});

// 星级评分
document.getElementById('starInput').addEventListener('click',function(e){
    if(e.target.tagName==='I'){
        _rating=parseInt(e.target.dataset.v);
        this.querySelectorAll('i').forEach(function(s,i){s.classList.toggle('active',i<_rating)});
    }
});
document.getElementById('starInput').addEventListener('mouseover',function(e){
    if(e.target.tagName==='I'){
        var v=parseInt(e.target.dataset.v);
        this.querySelectorAll('i').forEach(function(s,i){s.classList.toggle('active',i<v)});
    }
});
document.getElementById('starInput').addEventListener('mouseleave',function(){
    this.querySelectorAll('i').forEach(function(s,i){s.classList.toggle('active',i<_rating)});
});

// 提交评价
document.getElementById('reviewForm').addEventListener('submit',async function(e){
    e.preventDefault();
    if(_rating<1){alert('请选择评分');return}
    var content=document.getElementById('rvContent').value.trim();
    if(!content){alert('请填写评价内容');return}
    var user=JSON.parse(sessionStorage.getItem('user')||'{}');
    var body={
        orderId:parseInt(document.getElementById('rvOrderId').value),
        orderNo:document.getElementById('rvOrderNo').value,
        vehicleId:parseInt(document.getElementById('rvVehicleId').value),
        vehicleBrand:document.getElementById('rvVehicle').value.split(' ')[0]||'',
        vehicleModel:document.getElementById('rvVehicle').value.split(' ').slice(1).join(' ')||'',
        customerName:user.realName||user.username||'匿名用户',
        rating:_rating,content:content,likes:0,views:0
    };
    try{
        var r=await fetch(API+'/api/review/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        var d=await r.json();
        if(d.code===200){closeReviewModal();loadReviews();}
        else{alert(d.msg||'提交失败')}
    }catch(e){alert('网络错误')}
});

// 写评价入口（从user-home调用）
window.openWriteReview=function(orderId,orderNo,vehicleId,brand,model){
    document.getElementById('rvOrderId').value=orderId;
    document.getElementById('rvOrderNo').value=orderNo;
    document.getElementById('rvVehicleId').value=vehicleId;
    document.getElementById('rvVehicle').value=(brand||'')+' '+(model||'');
    document.getElementById('rvContent').value='';
    _rating=0;
    document.querySelectorAll('#starInput i').forEach(function(s){s.classList.remove('active')});
    document.getElementById('reviewOverlay').style.display='flex';
};

// 点赞（每人每帖只能一次，用localStorage记录）
function getLikedReviews(){ try{return JSON.parse(localStorage.getItem('liked_reviews')||'[]')}catch(e){return[]} }
function setLikedReview(id){ var a=getLikedReviews();if(a.indexOf(id)<0){a.push(id);localStorage.setItem('liked_reviews',JSON.stringify(a))} }
function hasLiked(id){ return getLikedReviews().indexOf(id)>=0 }

async function likeReview(id){
    if (hasLiked(id)) { return; }
    try{
        await fetch(API+'/api/review/like/'+id,{method:'POST'});
        setLikedReview(id);
        // 更新当前页面的数字和样式，不重新加载整个列表
        var btns=document.querySelectorAll('.like-btn[data-rid="'+id+'"]');
        btns.forEach(function(b){
            var num=parseInt(b.textContent.match(/\d+/)?.[0]||0)+1;
            b.innerHTML='👍 '+num+' <span style="font-size:.6875rem;color:var(--success);">已赞</span>';
            b.style.pointerEvents='none';
        });
        var unliked=document.querySelectorAll('.like-btn:not([data-rid="'+id+'"])');
    }catch(e){}
}

// 加载评价列表
async function loadReviews(){
    var c=document.getElementById('reviewContent');
    c.innerHTML='<div class="empty-state"><i class="fas fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:.5rem;"></i>加载中...</div>';
    try{
        var r=await fetch(API+'/api/review/popular');var d=await r.json();
        if(d.code===200&&d.data){
            var reviews=d.data;
            if(reviews.length===0){c.innerHTML='<div class="empty-state"><i class="fas fa-comment-slash" style="font-size:3rem;display:block;margin-bottom:.75rem;"></i><p>暂无评价，快来成为第一个评价的人吧</p></div>';return}
            c.innerHTML=reviews.map(function(rv){
                var stars='';
                for(var i=1;i<=5;i++)stars+='<i class="fas fa-star'+(i<=rv.rating?'':' empty')+'"></i>';
                return '<div class="review-card">'+
                    '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:.5rem;">'+
                    '<div><strong style="font-size:1rem;">'+escapeHtml(rv.customerName||'匿名')+'</strong>'+
                    '<span class="tag tag-blue" style="margin-left:.5rem;">'+escapeHtml(rv.vehicleBrand||'')+' '+escapeHtml(rv.vehicleModel||'')+'</span></div>'+
                    '<div class="stars">'+stars+'</div></div>'+
                    '<p style="color:var(--slate);line-height:1.7;">'+escapeHtml(rv.content||'')+'</p>'+
                    '<div class="review-meta">'+
                    '<span>📋 '+escapeHtml(rv.orderNo||'')+'</span>'+
                    '<span>🕐 '+fmtDate(rv.createTime)+'</span>'+
                    '<span class="like-btn" data-rid="'+rv.id+'" onclick="likeReview('+rv.id+')" style="'+(hasLiked(rv.id)?'pointer-events:none;':'')+'">👍 '+ (rv.likes||0) + (hasLiked(rv.id)?' <span style="font-size:.6875rem;color:var(--success);">已赞</span>':'') +'</span>'+
                    '<span>👁 '+ (rv.views||0) +'</span></div></div>';
            }).join('');
            // 异步增加浏览量
            reviews.forEach(function(rv){fetch(API+'/api/review/view/'+rv.id,{method:'POST'}).catch(function(){})});
        }
    }catch(e){c.innerHTML='<div class="empty-state">加载失败</div>'}
}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function fmtDate(t){if(!t)return'';return t.substring(0,10)}

loadReviews();

// 自动打开写评价（从user-home跳转过来）
(function(){
    var p = new URLSearchParams(window.location.search);
    if (p.get('action') === 'write') {
        setTimeout(function(){
            window.openWriteReview(
                p.get('orderId'), p.get('orderNo'), p.get('vehicleId'),
                p.get('brand'), p.get('model')
            );
        }, 500);
    }
})();
</script>
</body>
</html>
