<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 爱租车</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body { background: var(--gray-100); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
        .reg-card { background: #fff; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 2.5rem; width: 100%; max-width: 480px; }
        .reg-card .brand { text-align: center; margin-bottom: 1.5rem; }
        .reg-card .brand i { font-size: 2.5rem; color: var(--accent); }
        .reg-card .brand h2 { margin-top: 0.25rem; color: var(--dark); letter-spacing: 0.04em; }
        .reg-card .brand p { font-size: 0.875rem; color: var(--gray-400); }
        .section-head {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
            padding: 0 0 0.5rem 0.75rem; margin: 1.25rem 0 0.75rem;
            border-left: 3px solid; display: flex; align-items: center; gap: 0.5rem;
        }
        .section-head.account { color: var(--primary); border-color: var(--primary); }
        .section-head.info { color: var(--success); border-color: var(--success); }
        .alert { margin-bottom: 1rem; } .alert.hidden { display: none; }
        .link-row { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--gray-400); }
        .link-row a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="reg-card">
    <div class="brand"><i class="fas fa-user-plus"></i><h2>爱租车</h2><p>创建您的租车账户</p></div>
    <div class="alert alert-error hidden" id="errorMsg"></div>
    <div class="alert alert-success hidden" id="successMsg"></div>

    <form id="registerForm">
        <div class="section-head account">🔐 登录账号</div>
        <div class="form-group input-icon">
            <i class="fas fa-user-circle"></i>
            <input type="text" id="username" placeholder="设置用户名（至少3位）" required autocomplete="username">
        </div>
        <div class="form-row">
            <div class="form-group input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="设置密码（至少6位）" required autocomplete="new-password">
            </div>
            <div class="form-group input-icon">
                <i class="fas fa-lock"></i>
                <input type="password" id="confirmPassword" placeholder="再次输入密码" required autocomplete="new-password">
            </div>
        </div>

        <div class="section-head info">🪪 身份信息</div>
        <div class="form-row">
            <div class="form-group input-icon"><i class="fas fa-user"></i><input type="text" id="name" placeholder="真实姓名" required autocomplete="name"></div>
            <div class="form-group input-icon"><i class="fas fa-mobile-alt"></i><input type="tel" id="phone" placeholder="11位手机号" required autocomplete="tel"></div>
        </div>
        <div class="form-group input-icon"><i class="fas fa-id-card"></i><input type="text" id="idCard" placeholder="18位身份证号" required></div>
        <div class="form-group input-icon"><i class="fas fa-address-card"></i><input type="text" id="license" placeholder="驾驶证号" required></div>
        <div class="form-group input-icon"><i class="fas fa-edit"></i><input type="text" id="remark" placeholder="备注（选填）"></div>

        <button type="submit" class="btn btn-primary w-full btn-lg" id="registerBtn"><i class="fas fa-check-circle"></i> 提交注册</button>
    </form>
    <div class="link-row">已有账号？<a href="login.html">立即登录</a> · <a href="home.html" class="text-muted">返回首页</a></div>
</div>

<script>
const API = '';
function show(m, type) {
    const e = document.getElementById(type==='success'?'successMsg':'errorMsg');
    e.textContent = m; e.classList.remove('hidden');
    if (type==='error') { document.getElementById('successMsg').classList.add('hidden'); }
}
document.getElementById('phone').addEventListener('input', function(){ this.value = this.value.replace(/\D/g,'').substring(0,11); });
document.getElementById('idCard').addEventListener('input', function(){ this.value = this.value.toUpperCase().substring(0,18); });

document.getElementById('registerForm').addEventListener('submit', async function(e){
    e.preventDefault(); const btn = document.getElementById('registerBtn');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;
    const name = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const idCard = document.getElementById('idCard').value.trim();
    const license = document.getElementById('license').value.trim();
    const remark = document.getElementById('remark').value.trim();

    if (username.length < 3) { show('用户名至少3个字符', 'error'); return; }
    if (password.length < 6) { show('密码至少6位', 'error'); return; }
    if (password !== confirm) { show('两次密码不一致', 'error'); return; }
    if (!name) { show('请输入真实姓名', 'error'); return; }
    if (phone.length !== 11 || !/^1[3-9]\d{9}$/.test(phone)) { show('手机号格式不正确', 'error'); return; }
    if (idCard.length !== 18) { show('身份证号应为18位', 'error'); return; }
    if (!license) { show('请输入驾驶证号', 'error'); return; }

    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';
    try {
        const r = await fetch(API+'/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username, password, name, phone, idCard, license, remark}) });
        const d = await r.json();
        if (d.code===200) { show('注册成功！3秒后跳转登录页', 'success'); document.getElementById('registerForm').reset(); setTimeout(()=>{window.location.href='login.html';},3000); }
        else show(d.msg||'注册失败','error');
    } catch { show('网络连接失败','error'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-check-circle"></i> 提交注册'; }
});
</script>
</body>
</html>
