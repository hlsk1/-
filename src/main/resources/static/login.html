<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 爱租车</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body { background: var(--gray-100); display: flex; min-height: 100vh; }
        .auth-wrapper { display: flex; width: 100%; min-height: 100vh; }
        .auth-left {
            flex: 1; background: linear-gradient(135deg, var(--dark) 0%, #1e3a5f 100%);
            display: flex; align-items: center; justify-content: center; padding: 3rem;
            position: relative; overflow: hidden;
        }
        .auth-left::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 30%, rgba(37,99,235,0.06) 0%, transparent 50%);
        }
        .auth-left-content { position: relative; z-index: 1; text-align: center; }
        .auth-left-content .logo { font-size: 3.5rem; color: var(--accent); margin-bottom: 1rem; }
        .auth-left-content h1 {
            font-size: 2rem; color: #fff; font-weight: 800; letter-spacing: 0.08em;
        }
        .auth-left-content h1 span {
            background: linear-gradient(135deg, var(--accent-light), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-left-content p { color: rgba(255,255,255,0.55); margin-top: 0.5rem; font-size: 0.9375rem; }
        .auth-left-content .features {
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
            margin-top: 2.5rem; text-align: left;
        }
        .auth-left-content .features .feat {
            display: flex; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.65); font-size: 0.875rem;
        }
        .auth-left-content .features .feat i { color: var(--success); }

        .auth-right {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 3rem; background: #fff;
        }
        .auth-card { width: 100%; max-width: 400px; }
        .auth-card .tabs { display: flex; background: var(--gray-100); border-radius: var(--radius); padding: 4px; margin-bottom: 2rem; }
        .auth-card .tab {
            flex: 1; text-align: center; padding: 0.625rem; border-radius: 8px;
            font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            color: var(--gray-500); border: none; background: transparent;
        }
        .auth-card .tab.active { background: #fff; color: var(--primary); box-shadow: var(--shadow-sm); }
        .auth-card .tab.admin-tab.active { color: #7c3aed; }
        .auth-card h2 { font-size: 1.5rem; margin-bottom: 0.25rem; color: var(--dark); }
        .auth-card .subtitle { font-size: 0.875rem; color: var(--gray-400); margin-bottom: 1.5rem; }
        .auth-card .role-tag {
            display: inline-block; padding: 2px 10px; border-radius: 100px;
            font-size: 0.75rem; font-weight: 600; margin-bottom: 1rem;
        }
        .auth-card .role-tag.user { background: #eff6ff; color: var(--primary); }
        .auth-card .role-tag.admin { background: #f5f3ff; color: #7c3aed; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.875rem; color: var(--gray-400); }
        .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .auth-footer a.warn { color: var(--warning); }
        .auth-footer a:hover { text-decoration: underline; }
        @media (max-width: 768px) { .auth-left { display: none; } .auth-right { padding: 2rem; } }
    </style>
</head>
<body>
<div class="auth-wrapper">
    <div class="auth-left">
        <div class="auth-left-content">
            <div class="logo"><i class="fas fa-car"></i></div>
            <h1>爱<span>租</span>车</h1>
            <p>专业汽车租赁管理平台</p>
            <div class="features">
                <div class="feat"><i class="fas fa-check-circle"></i> 50+精选车型</div>
                <div class="feat"><i class="fas fa-check-circle"></i> 7×24小时服务</div>
                <div class="feat"><i class="fas fa-check-circle"></i> 全险安全保障</div>
                <div class="feat"><i class="fas fa-check-circle"></i> 极速取车还车</div>
            </div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-card">
            <div class="tabs">
                <button class="tab active" id="userTabEl" onclick="switchTab('user')"><i class="fas fa-user"></i> 用户登录</button>
                <button class="tab admin-tab" id="adminTabEl" onclick="switchTab('admin')"><i class="fas fa-shield-haltered"></i> 管理员</button>
            </div>
            <h2 id="loginTitle">欢迎回来</h2>
            <p class="subtitle" id="loginSubtitle">请使用您的账号登录</p>
            <span class="role-tag user" id="roleTag">👤 用户登录</span>

            <div class="alert alert-error hidden" id="errorMsg"></div>

            <form id="loginForm">
                <div class="form-group input-icon">
                    <i class="fas fa-user" id="unameIcon"></i>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                <div class="form-group input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary w-full btn-lg" id="loginBtn">
                    <i class="fas fa-arrow-right-to-bracket"></i> <span id="btnText">用户登录</span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="register.html">注册新账号</a> &nbsp;·&nbsp;
                <a href="forgot-password.html" class="warn">忘记密码</a> &nbsp;·&nbsp;
                <a href="home.html" class="text-muted">返回首页</a>
            </div>
        </div>
    </div>
</div>

<script>
const API = '', presets = {
    user:  { username:'',            password:'',            placeholder:'用户名 / 手机号', label:'欢迎回来', sub:'请使用您的账号登录', icon:'fa-user',    badge:'👤 用户登录', badgeClass:'user', btnClass:'btn-primary', btnText:'用户登录', tabClass:'' },
    admin: { username:'admin',       password:'123456',      placeholder:'管理员账号',     label:'管理员登录', sub:'请使用管理员账号登录', icon:'fa-shield-haltered', badge:'🛡️ 管理员', badgeClass:'admin', btnClass:'btn-primary', btnText:'管理员登录', tabClass:'admin-tab' }
};
let currentTab = 'user';

function switchTab(tab) {
    currentTab = tab; const p = presets[tab];
    document.getElementById('userTabEl').classList.toggle('active', tab==='user');
    document.getElementById('adminTabEl').classList.toggle('active', tab==='admin');
    document.getElementById('userTabEl').classList.toggle('admin-tab', tab==='admin');
    document.getElementById('loginTitle').textContent = p.label;
    document.getElementById('loginSubtitle').textContent = p.sub;
    const rt = document.getElementById('roleTag'); rt.textContent = p.badge; rt.className = 'role-tag ' + p.badgeClass;
    document.getElementById('unameIcon').className = 'fas ' + p.icon;
    const uname = document.getElementById('username'); uname.placeholder = p.placeholder; uname.value = p.username;
    document.getElementById('password').value = p.password;
    document.getElementById('btnText').textContent = p.btnText;
    document.getElementById('loginBtn').className = 'btn w-full btn-lg ' + p.btnClass;
    hideError();
}
function showError(m) { const e=document.getElementById('errorMsg'); e.textContent=m; e.classList.remove('hidden'); }
function hideError() { document.getElementById('errorMsg').classList.add('hidden'); }

document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault(); hideError();
    const btn = document.getElementById('loginBtn'), user = document.getElementById('username').value.trim(), pass = document.getElementById('password').value;
    if (!user || !pass) { showError('请输入'+(currentTab==='admin'?'管理员账号':'用户名')+'和密码'); return; }
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 验证中...';
    try {
        const r = await fetch(API+'/api/user/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, password:pass}) });
        const d = await r.json();
        if (d.code===200) {
            sessionStorage.setItem('user', JSON.stringify(d.data));
            sessionStorage.setItem('token', d.data.username);
            window.location.href = (d.data.role==='SUPER'||d.data.role==='ADMIN') ? '/index.html' : '/user-home.html';
        } else showError(d.msg||'登录失败');
    } catch { showError('网络连接失败'); }
    finally { btn.disabled = false; const p=presets[currentTab]; btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> '+p.btnText; }
});
switchTab('user');
</script>
</body>
</html>
