<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱租车 · 管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { display: flex; min-height: 100vh; color: var(--gray-800); }
        .sidebar {
            width: 240px; background: linear-gradient(180deg, var(--dark) 0%, #1e3a5f 100%);
            color: #fff; display: flex; flex-direction: column; min-height: 100vh;
            position: fixed; left: 0; top: 0; bottom: 0; z-index: 100;
        }
        .sidebar-brand {
            padding: 1.5rem 1.25rem; font-size: 1.25rem; font-weight: 800; letter-spacing: 0.04em;
            border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 0.75rem;
        }
        .sidebar-brand i { font-size: 1.5rem; color: var(--accent); }
        .sidebar-menu { flex: 1; padding: 1rem 0; overflow-y: auto; }
        .sidebar-menu .menu-title { padding: 0.75rem 1.5rem; font-size: 0.6875rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
        .sidebar-menu .menu-item {
            display: flex; align-items: center; padding: 0.625rem 1.5rem; cursor: pointer;
            transition: all 0.15s; border-left: 3px solid transparent;
            color: rgba(255,255,255,0.65); text-decoration: none; gap: 0.75rem; font-size: 0.875rem;
        }
        .sidebar-menu .menu-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
        .sidebar-menu .menu-item.active { background: rgba(255,255,255,0.1); color: var(--accent); border-left-color: var(--accent); }
        .sidebar-footer {
            padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 0.75rem; font-size: 0.875rem; color: rgba(255,255,255,0.55);
        }
        .sidebar-footer .avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; color: var(--dark); font-weight: 700; font-size: 0.875rem; }
        .main-content { flex: 1; margin-left: 240px; min-height: 100vh; }
        .topbar { background: #fff; padding: 0.875rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--gray-200); position: sticky; top: 0; z-index: 50; }
        .topbar .page-title { font-size: 1.125rem; font-weight: 700; color: var(--dark); }
        .topbar-actions { display: flex; align-items: center; gap: 1rem; font-size: 0.875rem; }
        .page-content { padding: 1.5rem 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: #fff; border-radius: var(--radius); padding: 1.25rem 1.5rem; box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); border-left: 4px solid var(--primary); transition: box-shadow 0.15s; }
        .stat-card:hover { box-shadow: var(--shadow-md); }
        .stat-card.gold { border-left-color: var(--accent); }
        .stat-card.green { border-left-color: var(--success); }
        .stat-card.purple { border-left-color: #7c3aed; }
        .stat-card .label { font-size: 0.8125rem; color: var(--gray-400); margin-bottom: 0.375rem; }
        .stat-card .value { font-size: 1.75rem; font-weight: 700; color: var(--dark); }
        .action-bar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1.25rem; background: #fff; padding: 1rem 1.25rem; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); }
        .action-bar .search-input, .action-bar select { padding: 0.5rem 0.75rem; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 0.875rem; outline: none; }
        .action-bar .search-input { flex: 1; min-width: 160px; }
        .action-bar .search-input:focus, .action-bar select:focus { border-color: var(--primary); }
        .table-container { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--gray-100); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
        table thead { background: var(--gray-50); }
        table th { padding: 0.75rem 1rem; text-align: left; font-weight: 600; color: var(--gray-500); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--gray-200); white-space: nowrap; }
        table td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); }
        table tbody tr:hover { background: var(--gray-50); }
        .status-badge { padding: 2px 10px; border-radius: 100px; font-size: 0.75rem; font-weight: 500; white-space: nowrap; display: inline-block; }
        .status-badge.available, .status-badge.completed, .status-badge.returned, .status-badge.normal, .status-badge.resolved { background: #ecfdf5; color: #059669; }
        .status-badge.rented, .status-badge.picked_up { background: #eff6ff; color: #2563eb; }
        .status-badge.repair, .status-badge.pending { background: #fffbeb; color: #d97706; }
        .status-badge.offline { background: #f8fafc; color: #64748b; }
        .status-badge.cancelled, .status-badge.blacklist { background: #fef2f2; color: #dc2626; }
        .table-actions { display: flex; gap: 4px; flex-wrap: wrap; }
        .btn-sm { padding: 4px 10px; font-size: 0.75rem; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; transition: all 0.15s; }
        .btn-sm.btn-primary { background: var(--primary); color: #fff; }
        .btn-sm.btn-primary:hover { background: var(--primary-dark); }
        .btn-sm.btn-success { background: var(--success); color: #fff; }
        .btn-sm.btn-success:hover { background: #059669; }
        .btn-sm.btn-danger { background: var(--danger); color: #fff; }
        .btn-sm.btn-danger:hover { background: #dc2626; }
        .btn-sm.btn-warning { background: var(--warning); color: #fff; }
        .btn-sm.btn-warning:hover { background: #d97706; }
        .btn-sm.btn-outline { background: #fff; border: 1px solid var(--gray-300); color: var(--gray-600); }
        .btn-sm.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,42,0.5); z-index: 200; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: #fff; border-radius: var(--radius-xl); padding: 2rem; max-width: 600px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-xl); animation: scaleIn 0.2s ease; }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .modal .modal-header h3 { font-size: 1.125rem; color: var(--dark); }
        .modal .modal-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--gray-400); }
        .modal .modal-close:hover { color: var(--gray-700); }
        .form-group { margin-bottom: 1.125rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 600; color: var(--gray-700); margin-bottom: 0.375rem; }
        .form-group label .required { color: var(--danger); }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.625rem 0.75rem; border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm); font-size: 0.875rem; outline: none; transition: border-color 0.15s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--gray-100); }
        .toast { position: fixed; top: 1.5rem; right: 1.5rem; padding: 0.75rem 1.25rem; color: #fff; border-radius: var(--radius-sm); z-index: 300; display: none; box-shadow: var(--shadow-lg); font-size: 0.875rem; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.warning { background: var(--warning); }
        .loading { text-align: center; padding: 3rem; color: var(--gray-400); }
        .loading i { font-size: 2rem; margin-bottom: 0.75rem; display: block; }
        .view-toggle button { padding: 6px 14px; border: 1px solid var(--gray-200); border-radius: 6px; background: #fff; cursor: pointer; font-size: 0.8125rem; color: var(--gray-600); transition: all 0.15s; }
        .view-toggle button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        @media (max-width: 768px) {
            .sidebar { width: 60px; }
            .sidebar-brand span, .sidebar-menu .menu-item span, .sidebar-menu .menu-title, .sidebar-footer .name { display: none; }
            .sidebar-brand { justify-content: center; padding: 1rem; }
            .main-content { margin-left: 60px; }
            .sidebar-menu .menu-item { justify-content: center; padding: 0.75rem; }
            .sidebar-footer { justify-content: center; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .page-content { padding: 1rem; }
            .topbar { padding: 0.75rem 1rem; }
        }
    </style>
</head>
<body>

<!-- 侧边栏 -->
<nav class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-car"></i>
        <span>爱租车</span>
    </div>
    <div class="sidebar-menu">
        <div class="menu-title">导航</div>
        <a class="menu-item active" data-page="dashboard" onclick="showPage('dashboard')">
            <i class="fas fa-chart-pie"></i><span>数据看板</span>
        </a>
        <a class="menu-item" data-page="vehicles" onclick="showPage('vehicles')">
            <i class="fas fa-car-side"></i><span>车辆管理</span>
        </a>
        <a class="menu-item" data-page="customers" onclick="showPage('customers')">
            <i class="fas fa-users"></i><span>客户管理</span>
        </a>
        <a class="menu-item" data-page="orders" onclick="showPage('orders')">
            <i class="fas fa-file-invoice"></i><span>订单管理</span>
        </a>
        <a class="menu-item" data-page="violations" onclick="showPage('violations')">
            <i class="fas fa-exclamation-triangle"></i><span>违章管理</span>
        </a>
        <a class="menu-item" data-page="statistics" onclick="showPage('statistics')">
            <i class="fas fa-chart-bar"></i><span>统计报表</span>
        </a>
        <div class="menu-title" style="margin-top:12px;">系统</div>
        <a class="menu-item" data-page="users" onclick="showPage('users')">
            <i class="fas fa-user-cog"></i><span>用户管理</span>
        </a>
        <a class="menu-item" data-page="config" onclick="showPage('config')">
            <i class="fas fa-cog"></i><span>系统配置</span>
        </a>
    </div>
    <div class="sidebar-footer">
        <div class="avatar" id="sidebarAvatar">A</div>
        <span class="name" id="sidebarUser">管理员</span>
    </div>
</nav>

<!-- 主内容 -->
<div class="main-content">
    <header class="topbar">
        <div class="page-title" id="pageTitle">📊 数据看板</div>
        <div class="topbar-actions">
            <span style="font-size:14px;color:#8c8f9c;" id="currentTime"></span>
            <button class="btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </header>
    <div class="page-content" id="pageContainer"></div>
</div>

<!-- 模态框 -->
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalContent"></div></div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="confirmOverlay">
    <div class="modal" style="max-width:400px;text-align:center;">
        <div style="font-size:2.5rem;margin-bottom:0.5rem;" id="confirmIcon"></div>
        <h3 style="margin-bottom:0.5rem;" id="confirmTitle"></h3>
        <p style="color:var(--gray-400);font-size:0.9375rem;margin-bottom:1.5rem;" id="confirmMsg"></p>
        <div style="display:flex;gap:0.75rem;justify-content:center;">
            <button class="btn btn-outline" onclick="resolveConfirm(false)">取消</button>
            <button class="btn btn-danger" id="confirmOkBtn" onclick="resolveConfirm(true)">确认</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// 1. 核心框架
// ============================================================
const API = '';

// 当前登录用户
let CURRENT_USER = null;

// 登录检查 + 角色菜单控制
(function checkAuth() {
    const user = sessionStorage.getItem('user');
    if (!user) { window.location.href = '/login.html'; return; }
    try {
        CURRENT_USER = JSON.parse(user);
        document.getElementById('sidebarAvatar').textContent = (CURRENT_USER.realName || CURRENT_USER.username || 'A')[0];
        document.getElementById('sidebarUser').textContent = CURRENT_USER.realName || CURRENT_USER.username || '管理员';

        // 角色权限控制：非SUPER角色隐藏系统管理菜单
        if (CURRENT_USER.role !== 'SUPER') {
            const sysMenus = document.querySelectorAll('.menu-title, .menu-item[data-page="users"], .menu-item[data-page="config"]');
            sysMenus.forEach(el => el.style.display = 'none');
            // 隐藏"系统"分类标题
            const sysTitle = document.querySelector('.menu-title:last-of-type');
            if (sysTitle && sysTitle.previousElementSibling?.dataset?.page === 'statistics') {
                sysTitle.style.display = 'none';
            }
        }
    } catch(e) {}
})();

// 时钟
function updateClock() {
    const now = new Date();
    document.getElementById('currentTime').textContent =
        now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' +
        String(now.getDate()).padStart(2,'0') + ' ' +
        ['日','一','二','三','四','五','六'][now.getDay()] + ' ' +
        String(now.getHours()).padStart(2,'0') + ':' +
        String(now.getMinutes()).padStart(2,'0') + ':' +
        String(now.getSeconds()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 1000);

// API 封装
async function $get(url) {
    const res = await fetch(API + url);
    return res.json();
}
async function $post(url, body) {
    const res = await fetch(API + url, {
        method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    return res.json();
}
async function $put(url, body) {
    const res = await fetch(API + url, {
        method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    return res.json();
}
async function $del(url) {
    const res = await fetch(API + url, { method: 'DELETE' });
    return res.json();
}

// Toast
let _toastTimer;
function toast(msg, type='success') {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.style.display = 'none', 3000);
}

// Modal
function openModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('active');
}
function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeConfirm(); } });

// ---- 自定义确认弹窗 ----
let _confirmResolve = null;
function showConfirm(title, message, icon, okText, okClass) {
    icon = icon || '⚠️';
    okText = okText || '确认';
    okClass = okClass || 'btn-danger';
    document.getElementById('confirmIcon').textContent = icon;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = message;
    const okBtn = document.getElementById('confirmOkBtn');
    okBtn.textContent = okText;
    okBtn.className = 'btn ' + okClass;
    document.getElementById('confirmOverlay').classList.add('active');
    return new Promise(resolve => { _confirmResolve = resolve; });
}
function resolveConfirm(result) {
    document.getElementById('confirmOverlay').classList.remove('active');
    if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
}
function closeConfirm() {
    if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
    document.getElementById('confirmOverlay').classList.remove('active');
}
document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) resolveConfirm(false);
});

// 退出
async function logout() {
    const ok = await showConfirm('退出登录', '确定要退出当前账号吗？', '👋', '退出', 'btn-danger');
    if (ok) { sessionStorage.clear(); window.location.href = '/login.html'; }
}

// ============================================================
// 2. 页面路由
// ============================================================
const PAGE_TITLES = {
    dashboard: '📊 数据看板',
    vehicles: '🚗 车辆管理',
    customers: '👥 客户管理',
    orders: '📋 订单管理',
    violations: '⚠️ 违章管理',
    statistics: '📈 统计报表',
    users: '👤 用户管理',
    config: '⚙️ 系统配置',
};

async function showPage(page) {
    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.menu-item[data-page="${page}"]`)?.classList.add('active');
    document.getElementById('pageTitle').textContent = PAGE_TITLES[page] || page;

    const container = document.getElementById('pageContainer');
    container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i><p>加载中...</p></div>';

    try {
        switch(page) {
            case 'dashboard': container.innerHTML = await renderDashboard(); break;
            case 'vehicles': container.innerHTML = await renderVehicles(); break;
            case 'customers': container.innerHTML = await renderCustomers(); break;
            case 'orders': container.innerHTML = await renderOrders(); break;
            case 'violations': container.innerHTML = await renderViolations(); break;
            case 'statistics': container.innerHTML = await renderStatistics(); break;
            case 'users': container.innerHTML = await renderUsers(); break;
            case 'config': container.innerHTML = await renderConfig(); break;
            default: container.innerHTML = '<p>页面建设中...</p>';
        }
    } catch(e) {
        container.innerHTML = '<p style="color:#f5222d;text-align:center;padding:40px;">加载失败: ' + e.message + '</p>';
    }
}

// ============================================================
// 3. 数据看板
// ============================================================
async function renderDashboard() {
    let stats;
    try {
        const res = await $get('/api/statistics/overview');
        stats = res.code === 200 ? res.data : null;
    } catch(e) { stats = null; }

    const totalOrders = stats?.totalOrders ?? 0;
    const totalRevenue = stats?.totalRevenue ?? 0;
    const activeVehicles = stats?.activeVehicles ?? 0;
    const totalCustomers = stats?.totalCustomers ?? 0;

    // 获取今日待取车/待还车
    let todayPickup = [], todayReturn = [];
    try {
        const [p, r] = await Promise.all([$get('/api/order/todayPickup'), $get('/api/order/todayReturn')]);
        todayPickup = p.code === 200 ? p.data : [];
        todayReturn = r.code === 200 ? r.data : [];
    } catch(e) {}

    const html = `
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">📋 总订单</div>
                <div class="value">${totalOrders}</div>
            </div>
            <div class="stat-card gold">
                <div class="label">💰 总收入</div>
                <div class="value">¥${Number(totalRevenue).toLocaleString()}</div>
            </div>
            <div class="stat-card green">
                <div class="label">🚗 可用车辆</div>
                <div class="value">${activeVehicles}</div>
            </div>
            <div class="stat-card purple">
                <div class="label">👥 客户总数</div>
                <div class="value">${totalCustomers}</div>
            </div>
        </div>
        <!-- 图表行 -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
            <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
                <h4 style="margin-bottom:8px;">🚗 车辆状态分布</h4>
                <div id="chartVehicleStatus" style="height:260px;"></div>
            </div>
            <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
                <h4 style="margin-bottom:8px;">📊 品牌车辆数量</h4>
                <div id="chartVehicleBrand" style="height:260px;"></div>
            </div>
        </div>
        <!-- 待办行 -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px;">
            <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
                <h4 style="margin-bottom:16px;">📌 今日待取车</h4>
                ${todayPickup.length ? todayPickup.map(o => `
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;">
                        <span>${o.orderNo} - ${o.customerName}</span>
                        <span style="color:#faad14;">${o.pickupTime || '-'}</span>
                    </div>
                `).join('') : '<p style="color:#8c8f9c;">暂无待取车订单</p>'}
            </div>
            <div style="background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
                <h4 style="margin-bottom:16px;">📌 今日待还车</h4>
                ${todayReturn.length ? todayReturn.map(o => `
                    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;">
                        <span>${o.orderNo} - ${o.customerName}</span>
                        <span style="color:#1890ff;">${o.returnTime || '-'}</span>
                    </div>
                `).join('') : '<p style="color:#8c8f9c;">暂无待还车订单</p>'}
            </div>
        </div>`;

    // 异步加载图表和状态概览
    // 延迟执行，确保DOM已渲染
    setTimeout(loadDashboardCharts, 100);
    return html;
}

async function loadDashboardCharts() {
    try {
        const res = await $get('/api/vehicle/statusSummary');
        if (res.code === 200 && res.data) {
            const statusCount = res.data.statusCount || {};
            renderStatusPieChart(statusCount);
        }
    } catch(e) {}

    try {
        const res = await $get('/api/vehicle/list');
        if (res.code === 200 && res.data) {
            renderBrandBarChart(res.data);
        }
    } catch(e) {}

    // 窗口大小变化时重绘
    window.addEventListener('resize', () => {
        const pieChart = echarts.getInstanceByDom(document.getElementById('chartVehicleStatus'));
        const barChart = echarts.getInstanceByDom(document.getElementById('chartVehicleBrand'));
        if (pieChart) pieChart.resize();
        if (barChart) barChart.resize();
    });
}

function renderStatusPieChart(statusCount) {
    const dom = document.getElementById('chartVehicleStatus');
    if (!dom) return;
    // 销毁旧实例
    const old = echarts.getInstanceByDom(dom);
    if (old) old.dispose();

    const chart = echarts.init(dom);
    const labels = { AVAILABLE: '可用', RENTED: '已租', REPAIR: '维修中', OFFLINE: '下架' };
    const colors = { AVAILABLE: '#52c41a', RENTED: '#1890ff', REPAIR: '#faad14', OFFLINE: '#bfbfbf' };

    const data = Object.entries(labels).map(([k, v]) => ({
        name: v, value: statusCount[k] || 0
    }));

    chart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} 辆 ({d}%)' },
        legend: { bottom: 0 },
        color: Object.values(colors),
        series: [{
            type: 'pie',
            radius: ['45%', '72%'],
            center: ['50%', '45%'],
            label: { formatter: '{b}\n{d}%' },
            emphasis: { itemStyle: { shadowBlur: 10, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.3)' } },
            data: data
        }]
    });
}

function renderBrandBarChart(vehicles) {
    const dom = document.getElementById('chartVehicleBrand');
    if (!dom) return;
    const old = echarts.getInstanceByDom(dom);
    if (old) old.dispose();

    const chart = echarts.init(dom);
    // 按品牌聚合
    const brandCount = {};
    vehicles.forEach(v => {
        const b = v.brand || '未知';
        brandCount[b] = (brandCount[b] || 0) + 1;
    });
    const sorted = Object.entries(brandCount).sort((a, b) => b[1] - a[1]).slice(0, 10);
    const brands = sorted.map(s => s[0]);
    const counts = sorted.map(s => s[1]);

    chart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '10%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', data: brands, axisLabel: { rotate: 30, fontSize: 11 } },
        yAxis: { type: 'value', name: '辆' },
        series: [{
            type: 'bar',
            data: counts,
            itemStyle: {
                borderRadius: [6, 6, 0, 0],
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    { offset: 0, color: '#1890ff' }, { offset: 1, color: '#69c0ff' }
                ])
            },
            emphasis: { itemStyle: { color: '#096dd9' } }
        }]
    });
}

async function showCustomerDetail(id) {
    const res = await $get('/api/customer/detail/' + id);
    if (res.code !== 200) { toast('客户不存在', 'error'); return; }
    const c = res.data;
    const cls = c.status === 'BLACKLIST' ? 'blacklist' : 'normal';
    const label = c.status === 'BLACKLIST' ? '黑名单' : '正常';

    // 并行获取该客户的订单和违章记录
    let ordersHtml = '<p style="color:#8c8f9c;">加载中...</p>';
    let violationsHtml = '<p style="color:#8c8f9c;">加载中...</p>';

    openModal(`
        <div class="modal-header"><h3>👤 客户详情 - ${c.name}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><strong>姓名</strong><br>${c.name||'-'}</div><div><strong>手机号</strong><br>${c.phone||'-'}</div>
            <div><strong>身份证</strong><br>${c.idCard||'-'}</div><div><strong>驾照号</strong><br>${c.license||'-'}</div>
            <div><strong>积分</strong><br>${c.points||0}</div>
            <div><strong>状态</strong><br><span class="status-badge ${cls}">${label}</span></div>
        </div>
        <div style="margin-top:16px;padding-top:12px;border-top:1px solid #f0f0f0;">
            <h4>📋 历史订单 <span id="orderCount" style="font-weight:400;font-size:13px;color:#8c8f9c;"></span></h4>
            <div id="customerOrders">${ordersHtml}</div>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px solid #f0f0f0;">
            <h4>⚠️ 违章记录 <span id="violCount" style="font-weight:400;font-size:13px;color:#8c8f9c;"></span></h4>
            <div id="customerViolations">${violationsHtml}</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">关闭</button>
            <button class="btn btn-primary" onclick="closeModal();showAddViolationForCustomer('${c.name}')">➕ 新增违章</button>
        </div>
    `);

    // 异步加载订单和违章
    try {
        const or = await $get('/api/order/list?customerName=' + encodeURIComponent(c.name));
        if (or.code === 200 && or.data) {
            const orders = or.data;
            document.getElementById('orderCount').textContent = ' (' + orders.length + '条)';
            document.getElementById('customerOrders').innerHTML = orders.length ? orders.map(o =>
                `<div style="font-size:13px;padding:6px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;">
                    <span><strong>${o.orderNo}</strong> - ${o.vehicleBrand||''} ${o.vehicleModel||''} ${o.vehiclePlate||''}</span>
                    <span>${o.pickupTime||'-'} ~ ${o.returnTime||'-'} | <span class="status-badge ${(o.status||'').toLowerCase()}">${ORDER_STATUS_MAP[o.status]||o.status}</span> | ¥${o.finalAmount||o.totalAmount||0}</span>
                </div>`
            ).join('') : '<p style="color:#8c8f9c;">暂无订单记录</p>';
        }
    } catch(e) {
        document.getElementById('customerOrders').innerHTML = '<p style="color:#f5222d;">加载失败</p>';
    }

    try {
        const vr = await $get('/api/violation/list?customerName=' + encodeURIComponent(c.name));
        if (vr.code === 200 && vr.data) {
            const viols = vr.data;
            document.getElementById('violCount').textContent = ' (' + viols.length + '条)';
            document.getElementById('customerViolations').innerHTML = viols.length ? viols.map(v =>
                `<div style="font-size:13px;padding:6px 0;border-bottom:1px solid #f5f5f5;display:flex;justify-content:space-between;">
                    <span>${v.violationTime||'-'} | ${v.location||'-'} | ${v.vehiclePlate||'-'}</span>
                    <span>扣${v.points||0}分 罚¥${v.fineAmount||0} | <span class="status-badge ${v.status==='RESOLVED'?'resolved':'repair'}">${v.status==='RESOLVED'?'已处理':'待处理'}</span></span>
                </div>`
            ).join('') : '<p style="color:#8c8f9c;">暂无违章记录</p>';
        }
    } catch(e) {
        document.getElementById('customerViolations').innerHTML = '<p style="color:#f5222d;">加载失败</p>';
    }
}

async function showCreateOrder() {

async function resolveViolation(id) {
    if (!await showConfirm('标记已处理', '确认该违章已处理完毕？', '✅', '确认处理', 'btn-success')) return;
    const user = JSON.parse(sessionStorage.getItem('user') || '{}');
    const resolver = user.realName || user.username || '系统管理员';
    const r = await $post(`/api/violation/resolve/${id}?resolver=${encodeURIComponent(resolver)}`);
    if (r.code === 200) { toast('已标记为已处理'); showPage('violations'); }
    else { toast(r.msg || '操作失败', 'error'); }
}

async function loadHotVehicles() {
    try {
        const r = await $get('/api/vehicle/list');
        if (r.code === 200 && r.data) {
            // 按日租金降序排列模拟热度（实际应该从订单统计）
            const vehicles = r.data.sort((a,b) => (b.dailyPrice||0) - (a.dailyPrice||0)).slice(0, 8);
            const el = document.getElementById('hotVehicles');
            if (el) el.innerHTML = vehicles.map((v,i) =>
                `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;">
                    <span>${i+1}. ${v.brand||''} ${v.model||''} ${v.plateNumber||''}</span>
                    <span style="color:#1890ff;">¥${v.dailyPrice||0}/日</span>
                </div>`
            ).join('');
        }
    } catch(e) {}
}

async function loadViolationStats() {
    try {
        const r = await $get('/api/violation/statistics/byVehicle');
        if (r.code === 200 && r.data) {
            const data = Array.isArray(r.data) ? r.data.slice(0, 8) : [];
            const el = document.getElementById('violStats');
            if (el) el.innerHTML = data.length ? data.map((item,i) =>
                `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f5f5;">
                    <span>${i+1}. ${item[0]||'-'}</span>
                    <span style="color:#f5222d;">${item[1]||0}次</span>
                </div>`
            ).join('') : '<p style="color:#8c8f9c;">暂无违章数据</p>';
        }
    } catch(e) { const el = document.getElementById('violStats'); if (el) el.innerHTML = '<p style="color:#8c8f9c;">暂无数据</p>'; }
}

async function loadStatsCharts() {
    // 收入趋势图
    try {
        const res = await $get('/api/order/list');
        if (res.code === 200 && res.data) {
            const orders = res.data;
            // 按日期聚合收入
            const dailyRevenue = {};
            orders.forEach(o => {
                const date = (o.createTime || o.pickupTime || '').substring(0, 10);
                if (date) {
                    const amt = Number(o.finalAmount || o.totalAmount || 0);
                    dailyRevenue[date] = (dailyRevenue[date] || 0) + amt;
                }
            });
            const dates = Object.keys(dailyRevenue).sort().slice(-14);
            const values = dates.map(d => dailyRevenue[d]);

            const dom = document.getElementById('chartRevenueTrend');
            if (dom) {
                const old = echarts.getInstanceByDom(dom); if (old) old.dispose();
                const chart = echarts.init(dom);
                chart.setOption({
                    tooltip: { trigger: 'axis' },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: { type: 'category', data: dates, axisLabel: { rotate: 30, fontSize: 10 } },
                    yAxis: { type: 'value', name: '元' },
                    series: [{
                        type: 'line', data: values, smooth: true,
                        lineStyle: { color: '#1890ff', width: 2 },
                        areaStyle: { color: { type: 'linear', x: 0, y: 0, x2: 0, y2: 1,
                            colorStops: [{ offset: 0, color: 'rgba(24,144,255,0.3)' }, { offset: 1, color: 'rgba(24,144,255,0.02)' }] } },
                        itemStyle: { color: '#1890ff' }
                    }]
                });
            }
        }
    } catch(e) {}

    // 车辆出租率
    try {
        const res = await $get('/api/vehicle/statusSummary');
        if (res.code === 200 && res.data) {
            const statusCount = res.data.statusCount || {};
            const total = Object.values(statusCount).reduce((a, b) => a + b, 0) || 1;
            const rented = statusCount['RENTED'] || 0;
            const rate = Math.round(rented / total * 100);

            const dom = document.getElementById('chartUtilRate');
            if (dom) {
                const old = echarts.getInstanceByDom(dom); if (old) old.dispose();
                const chart = echarts.init(dom);
                chart.setOption({
                    series: [{
                        type: 'gauge',
                        startAngle: 210, endAngle: -30,
                        center: ['50%', '55%'],
                        radius: '85%',
                        min: 0, max: 100,
                        progress: { show: true, width: 18, itemStyle: { color: { type: 'linear', x: 0, y: 0, x2: 1, y2: 0,
                            colorStops: [{ offset: 0, color: '#52c41a' }, { offset: 0.5, color: '#faad14' }, { offset: 1, color: '#f5222d' }] } } },
                        axisLine: { lineStyle: { width: 18, color: [[0.4, '#52c41a'],[0.7, '#faad14'],[1, '#f5222d']] } },
                        axisTick: { show: false },
                        splitLine: { show: false },
                        axisLabel: { show: false },
                        detail: { valueAnimation: true, formatter: '{value}%', fontSize: 28, fontWeight: 'bold', offsetCenter: [0, '70%'] },
                        data: [{ value: rate, name: '出租率' }]
                    }]
                });
            }
        }
    } catch(e) {}
}

// 时间维度切换
function switchTimeDim(dim) {
    ['Today','Month','Year'].forEach(d => {
        const btn = document.getElementById('dim' + d);
        if (btn) {
            if (d === dim.charAt(0).toUpperCase() + dim.slice(1)) {
                btn.className = 'btn btn-primary active';
            } else {
                btn.className = 'btn btn-outline';
            }
        }
    });
    toast('已切换至' + {today:'今日', month:'本月', year:'本年'}[dim] + '视图（数据加载中...）', 'success');
    showPage('statistics');
}

    const logData = res.code === 200 ? res.data : null;
    openModal(`
        <div class="modal-header"><h3>📋 登录日志 - ${realName||username||''}</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
        ${logData ? `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div><strong>用户名</strong><br>${logData.username||'-'}</div>
                <div><strong>用户ID</strong><br>${logData.userId||'-'}</div>
                <div><strong>最后登录时间</strong><br>${logData.lastLoginTime||'暂无记录'}</div>
                <div><strong>最后登录IP</strong><br>${logData.lastLoginIp||'暂无记录'}</div>
            </div>
        ` : '<p style="color:#8c8f9c;">暂无登录记录</p>'}
        <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">关闭</button></div>
    `);
}

async function deleteUser(id) {
    const res = await $get('/api/user/' + id);
    if (res.code !== 200) { toast('用户不存在', 'error'); return; }
    if (!await showConfirm('删除账号', `确定要删除账号「${res.data.username}」吗？此操作不可恢复！`, '🗑️', '确认删除', 'btn-danger')) return;
    const r = await $del('/api/user/delete/' + id);
    if (r.code === 200) { toast('账号已删除', 'error'); showPage('users'); }
    else { toast(r.msg || '删除失败', 'error'); }
}

// ============================================================
// 10. 系统配置
// ============================================================
async function renderConfig() {
    let configs = {};
    try {
        const res = await $get('/api/config/map');
        if (res.code === 200) configs = res.data || {};
    } catch(e) {}

    const maxDailyPrice = configs['maxDailyPrice'] || '1000';
    const depositRatio = configs['depositRatio'] || '0.3';
    const overtimeRate = configs['overtimeRate'] || '50';
    const violationDeposit = configs['violationDeposit'] || '500';

    // 车辆状态列表
    let statusList = ['AVAILABLE', 'RENTED', 'REPAIR', 'OFFLINE'];
    try {
        const sr = await $get('/api/vehicle/statusSummary');
        if (sr.code === 200 && sr.data && sr.data.statusCount) {
            statusList = Object.keys(sr.data.statusCount);
        }
    } catch(e) {}

    return `
        <div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06);max-width:800px;">
            <h3 style="margin-bottom:20px;">⚙️ 系统参数配置</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>日租金上限 (元) <span class="required">*</span></label>
                    <input type="number" id="cfgMaxPrice" value="${maxDailyPrice}" style="width:200px;">
                </div>
                <div class="form-group">
                    <label>押金比例</label>
                    <input type="number" id="cfgDepositRatio" value="${depositRatio}" step="0.01" min="0" max="1" style="width:200px;">
                    <span style="color:#8c8f9c;margin-left:8px;">(0~1)</span>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>超时费率 (元/小时)</label>
                    <input type="number" id="cfgOvertimeRate" value="${overtimeRate}" style="width:200px;">
                </div>
                <div class="form-group">
                    <label>违章保证金 (元)</label>
                    <input type="number" id="cfgViolationDeposit" value="${violationDeposit}" style="width:200px;">
                </div>
            </div>

            <h4 style="margin:20px 0 12px;">📌 车辆状态字典</h4>
            <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;" id="statusTags">
                ${statusList.map(s => `
                    <span style="background:#f0f2f5;padding:4px 14px;border-radius:16px;display:inline-flex;align-items:center;gap:6px;">
                        ${s}
                        <i class="fas fa-times" style="cursor:pointer;color:#f5222d;font-size:11px;" onclick="alert('状态字典由系统自动维护')" title="自动维护，不可删除"></i>
                    </span>
                `).join('')}
                <span style="color:#8c8f9c;font-size:12px;">（由车辆状态自动维护）</span>
            </div>

            <div style="margin-top:24px;padding-top:16px;border-top:1px solid #f0f0f0;display:flex;gap:12px;">
                <button class="btn btn-primary" onclick="saveSystemConfig()"><i class="fas fa-save"></i> 保存配置</button>
                <button class="btn btn-outline" onclick="showToast('配置已重置为默认值', 'warning')"><i class="fas fa-undo"></i> 恢复默认</button>
                <span style="margin-left:12px;color:#8c8f9c;font-size:13px;" id="cfgSaveTime"></span>
            </div>
        </div>`;
}

async function saveSystemConfig() {
    const configs = {
        maxDailyPrice: document.getElementById('cfgMaxPrice')?.value || '1000',
        depositRatio: document.getElementById('cfgDepositRatio')?.value || '0.3',
        overtimeRate: document.getElementById('cfgOvertimeRate')?.value || '50',
        violationDeposit: document.getElementById('cfgViolationDeposit')?.value || '500',
    };
    const res = await $post('/api/config/saveBatch', configs);
    if (res.code === 200) {
        document.getElementById('cfgSaveTime').textContent = '✅ 已保存 ' + new Date().toLocaleString();
        toast('配置保存成功！');
    } else {
        toast(res.msg || '保存失败', 'error');
    }
}

// ============================================================
// 图片上传预览
function previewUploadImages(input) {
    const container = document.getElementById('imagePreview');
    if (!container) return;
    container.innerHTML = '';
    Array.from(input.files).forEach((file, idx) => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const div = document.createElement('div');
            div.style.cssText = 'position:relative;width:80px;height:80px;border-radius:8px;overflow:hidden;border:2px solid #e8e8e8;';
            div.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover;">' +
                '<span style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;" onclick="this.parentElement.remove()">×</span>';
            container.appendChild(div);
        };
        reader.readAsDataURL(file);
    });
}

// 获取车辆首图
function getVehicleImage(imageUrls) {
    if (!imageUrls) return '🚗';
    const urls = imageUrls.split(',').filter(u => u.trim());
    if (urls.length === 0) return '🚗';
    return urls[0].trim();
}

// 11. 通用表格过滤
// ============================================================
function filterTable(input) {
    const tableId = input.dataset.table;
    const colIdx = input.dataset.col ? parseInt(input.dataset.col) : null;
    const keyword = (input.value || '').toLowerCase();
    const rows = document.querySelectorAll(`#${tableId} tr`);

    rows.forEach(row => {
        if (colIdx !== null && keyword) {
            // 按特定列筛选
            const cell = row.querySelectorAll('td')[colIdx];
            const text = (cell?.textContent || '').toLowerCase();
            row.style.display = text.includes(keyword) ? '' : 'none';
        } else if (keyword) {
            // 全字段搜索
            const text = row.textContent.toLowerCase();
            row.style.display = text.includes(keyword) ? '' : 'none';
        } else {
            row.style.display = '';
        }
    });
}
