<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱租车 · 管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
    <script>if(typeof Vue==='undefined'){ document.write('<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"><\/script>'); }</script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        :root { --bg: #f1f5f9; --side-w: 240px; --primary: #2563eb; --primary-light: #eff6ff; --success: #16a34a; --danger: #dc2626; --warning: #d97706; --text: #1e293b; --text-muted: #94a3b8; --border: #e2e8f0; --card-bg: #fff; --radius: 10px; }
        * { margin:0;padding:0;box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); display:flex; min-height:100vh; }
        #app { flex: 1; display: flex; flex-direction: column; }
        a { color: var(--primary); text-decoration: none; }

        /* Sidebar */
        .sidebar { width: var(--side-w); background: #0f172a; color: #fff; position: fixed; inset: 0 auto 0 0; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-brand { padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 0.625rem; border-bottom: 1px solid rgba(255,255,255,.06); }
        .sidebar-brand .logo { width: 36px; height: 36px; background: linear-gradient(135deg,#f59e0b,#fbbf24); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.125rem; color: #0f172a; }
        .sidebar-brand .name { font-weight: 700; font-size: 1rem; letter-spacing: .04em; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: .75rem 0; }
        .sidebar-nav .nav-section { padding: .75rem 1.5rem .25rem; font-size: .625rem; text-transform: uppercase; letter-spacing: .1em; color: rgba(255,255,255,.25); font-weight: 600; }
        .sidebar-nav .nav-item { display: flex; align-items: center; gap: .625rem; padding: .5rem 1.5rem; margin: 2px .75rem; border-radius: 6px; cursor: pointer; font-size: .875rem; color: rgba(255,255,255,.55); transition: all .15s; border-left: 0; }
        .sidebar-nav .nav-item:hover { background: rgba(255,255,255,.05); color: rgba(255,255,255,.8); }
        .sidebar-nav .nav-item.active { background: rgba(37,99,235,.25); color: #60a5fa; font-weight: 500; }
        .sidebar-nav .nav-item .icon { width: 20px; text-align: center; font-size: .875rem; }
        .sidebar-footer { padding: 1rem 1.5rem; border-top: 1px solid rgba(255,255,255,.06); display: flex; align-items: center; gap: .625rem; font-size: .8125rem; color: rgba(255,255,255,.45); }
        .sidebar-footer .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: #fff; }

        /* Main */
        .main { flex: 1; margin-left: var(--side-w); min-height: 100vh; }
        .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
        .topbar .breadcrumb { font-size: .8125rem; color: var(--text-muted); display: flex; align-items: center; gap: .375rem; }
        .topbar .breadcrumb span.current { color: var(--text); font-weight: 600; }
        .topbar .time { font-size: .8125rem; color: var(--text-muted); }
        .page-content { padding: 1.5rem; }

        /* Stats */
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: var(--card-bg); border-radius: var(--radius); padding: 1.125rem 1.25rem; border: 1px solid var(--border); display: flex; align-items: center; gap: .875rem; }
        .stat-card .stat-icon { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.125rem; flex-shrink: 0; }
        .stat-card .stat-info .stat-val { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
        .stat-card .stat-info .stat-lbl { font-size: .75rem; color: var(--text-muted); }

        /* Toolbar & Table */
        .toolbar { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: .75rem 1rem; margin-bottom: 1rem; display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
        .toolbar input, .toolbar select { padding: .4375rem .625rem; border: 1px solid var(--border); border-radius: 6px; font-size: .8125rem; outline: none; }
        .toolbar input:focus, .toolbar select:focus { border-color: var(--primary); }
        .toolbar input { flex: 1; min-width: 140px; }
        .table-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
        table th { background: #f8fafc; padding: .625rem .875rem; text-align: left; font-weight: 600; font-size: .6875rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); border-bottom: 1px solid var(--border); }
        table td { padding: .5625rem .875rem; border-bottom: 1px solid #f1f5f9; }
        table tr:hover td { background: #f8fafc; }
        .badge { display: inline-block; padding: 1px 8px; border-radius: 100px; font-size: .6875rem; font-weight: 500; }
        .badge-blue { background: #eff6ff; color: #2563eb; }
        .badge-green { background: #f0fdf4; color: #16a34a; }
        .badge-amber { background: #fffbeb; color: #d97706; }
        .badge-red { background: #fef2f2; color: #dc2626; }
        .badge-gray { background: #f8fafc; color: #64748b; }

        /* Card Grid */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .v-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: all .15s; }
        .v-card:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,.08); }
        .v-card .v-img { height: 150px; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background-size: cover; background-position: center; }
        .v-card .v-info { padding: .875rem; }
        .v-card .v-info .name { font-weight: 600; font-size: .9375rem; }
        .v-card .v-info .meta { font-size: .75rem; color: var(--text-muted); margin: .25rem 0; }
        .v-card .v-info .footer { display: flex; justify-content: space-between; align-items: center; margin-top: .5rem; }
        .v-card .v-info .price { font-weight: 700; color: var(--danger); font-size: 1.125rem; }

        /* Buttons */
        .btn { display: inline-flex; align-items: center; gap: 4px; padding: .4375rem .875rem; border-radius: 6px; border: none; font-size: .8125rem; font-weight: 500; cursor: pointer; transition: all .15s; }
        .btn:disabled { opacity: .5; cursor: not-allowed; }
        .btn-primary { background: var(--primary); color: #fff; } .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: var(--success); color: #fff; } .btn-success:hover { background: #15803d; }
        .btn-danger { background: var(--danger); color: #fff; } .btn-danger:hover { background: #b91c1c; }
        .btn-warning { background: var(--warning); color: #fff; } .btn-warning:hover { background: #b45309; }
        .btn-outline { border: 1px solid var(--border); background: #fff; color: var(--text); } .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-xs { padding: 2px 8px; font-size: .6875rem; border-radius: 4px; }

        .modal-mask { position: fixed; inset: 0; background: rgba(15,23,42,.45); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-box { background: #fff; border-radius: 14px; padding: 1.5rem; width: 90%; max-width: 560px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 40px rgba(0,0,0,.15); }
        .modal-box h3 { font-size: 1rem; margin-bottom: 1rem; }
        .form-label { display: block; font-size: .8125rem; font-weight: 600; margin-bottom: .25rem; color: var(--text); }
        .form-input, .form-select, .form-textarea { width: 100%; padding: .5rem .625rem; border: 1px solid var(--border); border-radius: 6px; font-size: .8125rem; font-family: inherit; outline: none; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.08); }
        .form-textarea { min-height: 70px; resize: vertical; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
        .form-group { margin-bottom: .875rem; }
        .form-actions { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1rem; padding-top: .875rem; border-top: 1px solid var(--border); }
        .toast { position: fixed; top: 1rem; right: 1rem; padding: .625rem 1rem; border-radius: 8px; color: #fff; font-size: .8125rem; z-index: 300; box-shadow: 0 4px 12px rgba(0,0,0,.15); animation: toastIn .25s ease; }
        @keyframes toastIn { from { opacity:0;transform:translateY(-8px); } to { opacity:1;transform:translateY(0); } }
        .empty { text-align: center; padding: 3rem; color: var(--text-muted); font-size: .875rem; }
        .loading-spin { text-align: center; padding: 2rem; color: var(--text-muted); }
        @media (max-width: 768px) { .sidebar { width: 56px; } .sidebar-brand .name, .sidebar-nav .nav-item span, .sidebar-nav .nav-section, .sidebar-footer .info { display: none; } .sidebar-nav .nav-item { justify-content: center; padding: .5rem; margin: 2px .25rem; } .main { margin-left: 56px; } .form-row { grid-template-columns: 1fr; } .stat-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-brand"><div class="logo">🚗</div><div class="name">爱租车</div></div>
    <nav class="sidebar-nav">
        <div class="nav-section">业务管理</div>
        <a class="nav-item active" data-page="dashboard" onclick="switchSidebar(this)"><span class="icon">📊</span> <span>数据看板</span></a>
        <a class="nav-item" data-page="vehicles" onclick="switchSidebar(this)"><span class="icon">🚗</span> <span>车辆管理</span></a>
        <a class="nav-item" data-page="customers" onclick="switchSidebar(this)"><span class="icon">👥</span> <span>客户管理</span></a>
        <a class="nav-item" data-page="orders" onclick="switchSidebar(this)"><span class="icon">📋</span> <span>订单管理</span></a>
        <a class="nav-item" data-page="violations" onclick="switchSidebar(this)"><span class="icon">⚠️</span> <span>违章管理</span></a>
        <div class="nav-section" style="margin-top:.5rem">系统管理</div>
        <a class="nav-item" data-page="stats" onclick="switchSidebar(this)"><span class="icon">📈</span> <span>统计报表</span></a>
        <a class="nav-item" data-page="users" onclick="switchSidebar(this)"><span class="icon">👤</span> <span>用户管理</span></a>
        <a class="nav-item" data-page="config" onclick="switchSidebar(this)"><span class="icon">⚙️</span> <span>系统配置</span></a>
    </nav>
    <div class="sidebar-footer">
        <div class="avatar" id="sideAvatar">A</div>
        <div class="info" style="flex:1;"><div style="color:rgba(255,255,255,.7);font-weight:500;" id="sideName">管理员</div><div style="font-size:.6875rem;" id="sideRole"></div></div>
        <button onclick="logout()" style="background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:1.125rem;padding:4px;" title="退出登录"><i class="fas fa-sign-out-alt"></i></button>
    </div>
</aside>

<div id="app">
    <div class="main">
        <header class="topbar">
            <div class="breadcrumb"><span>爱租车</span> <span style="color:#cbd5e1;">/</span> <span class="current" id="breadcrumbTitle">数据看板</span></div>
            <div class="time" id="topTime"></div>
        </header>
        <div class="page-content">

            <!-- ====== Dashboard ====== -->
            <template v-if="page==='dashboard'">
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-icon" style="background:#eff6ff;color:var(--primary);">📋</div><div class="stat-info"><div class="stat-val">{{ dash.orders }}</div><div class="stat-lbl">总订单</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:var(--warning);">💰</div><div class="stat-info"><div class="stat-val">¥{{ dash.revenue.toLocaleString() }}</div><div class="stat-lbl">总收入</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#f0fdf4;color:var(--success);">🚗</div><div class="stat-info"><div class="stat-val">{{ dash.activeVehicles }}</div><div class="stat-lbl">可用车辆</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#f5f3ff;color:#7c3aed;">👥</div><div class="stat-info"><div class="stat-val">{{ dash.customers }}</div><div class="stat-lbl">客户总数</div></div></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;"><h4 style="font-size:.875rem;margin-bottom:.5rem;">🚗 车辆状态分布</h4><div id="chartPie" style="height:240px;"></div></div>
                    <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;"><h4 style="font-size:.875rem;margin-bottom:.5rem;">📊 品牌数量</h4><div id="chartBar" style="height:240px;"></div></div>
                </div>
            </template>

            <!-- ====== Vehicles ====== -->
            <template v-if="page==='vehicles'">
                <div class="toolbar">
                    <button class="btn btn-primary" @click="openVehicleModal()"><i class="fas fa-plus"></i> 新增车辆</button>
                    <button class="btn btn-outline" @click="exportVehicles"><i class="fas fa-download"></i> 导出</button>
                    <button class="btn btn-outline btn-xs" :class="{active: viewMode==='list'}" @click="viewMode='list'" style="margin-left:auto">列表</button>
                    <button class="btn btn-outline btn-xs" :class="{active: viewMode==='card'}" @click="viewMode='card'">卡片</button>
                    <input placeholder="搜索..." v-model="vehicleSearch" @input="filterVehicles">
                </div>
                <div v-if="viewMode==='list'" class="table-wrap">
                    <table><thead><tr><th>品牌/型号</th><th>车牌</th><th>颜色</th><th>座位</th><th>日租金</th><th>状态</th><th>车位</th><th>操作</th></tr></thead>
                    <tbody><tr v-for="v in filteredVehicles" :key="v.id">
                        <td><strong>{{ v.brand }}</strong> {{ v.model }}</td><td>{{ v.plateNumber }}</td><td>{{ v.color }}</td><td>{{ v.seatCount }}座</td><td>¥{{ v.dailyPrice }}</td>
                        <td><span class="badge" :class="statusClass(v.status)">{{ statusLabel(v.status) }}</span></td><td>{{ v.parkingSpot||'-' }}</td>
                        <td style="display:flex;gap:3px;flex-wrap:wrap;">
                            <button class="btn btn-xs btn-primary" @click="openVehicleModal(v)">编辑</button>
                            <button v-if="v.status==='AVAILABLE'" class="btn btn-xs btn-warning" @click="setRepair(v)">维修</button>
                            <button v-if="v.status==='REPAIR'" class="btn btn-xs btn-success" @click="completeRepair(v)">完成维修</button>
                        </td>
                    </tr></tbody></table>
                </div>
                <div v-else class="card-grid">
                    <div class="v-card" v-for="v in filteredVehicles" :key="v.id" @click="openVehicleModal(v)">
                        <div class="v-img" :style="v._img ? 'background-image:url('+v._img+');background-size:cover;' : ''">{{ v._img ? '' : '🚗' }}</div>
                        <div class="v-info"><div class="name">{{ v.brand }} {{ v.model }}</div><div class="meta">{{ v.plateNumber }} · {{ v.color }} · {{ v.seatCount }}座</div>
                        <div class="footer"><span class="price">¥{{ v.dailyPrice }}<small style="font-size:.6875rem;color:var(--text-muted);">/日</small></span><span class="badge" :class="statusClass(v.status)">{{ statusLabel(v.status) }}</span></div></div>
                    </div>
                </div>
            </template>

            <!-- ====== Customers ====== -->
            <template v-if="page==='customers'">
                <div class="toolbar"><button class="btn btn-primary" @click="openCustomerModal()"><i class="fas fa-user-plus"></i> 新增客户</button><input placeholder="搜索..." v-model="customerSearch"></div>
                <div class="table-wrap"><table><thead><tr><th>姓名</th><th>手机号</th><th>身份证</th><th>驾照</th><th>积分</th><th>状态</th><th>操作</th></tr></thead>
                <tbody><tr v-for="c in filteredCustomers" :key="c.id">
                    <td><strong>{{ c.name }}</strong></td><td>{{ c.phone }}</td><td>{{ c.idCard }}</td><td>{{ c.license }}</td><td>{{ c.points }}</td>
                    <td><span class="badge" :class="c.status==='BLACKLIST'?'badge-red':'badge-green'">{{ c.status==='BLACKLIST'?'黑名单':'正常' }}</span></td>
                    <td style="display:flex;gap:3px;">
                        <button class="btn btn-xs btn-primary" @click="openCustomerModal(c)">编辑</button>
                        <button class="btn btn-xs btn-warning" @click="showAddPoints(c)">积分</button>
                        <button v-if="c.status!=='BLACKLIST'" class="btn btn-xs btn-danger" @click="toggleBlacklist(c,true)">拉黑</button>
                        <button v-else class="btn btn-xs btn-success" @click="toggleBlacklist(c,false)">移出</button>
                    </td>
                </tr></tbody></table></div>
            </template>

            <!-- ====== Orders ====== -->
            <template v-if="page==='orders'">
                <div class="toolbar"><button class="btn btn-primary" @click="openOrderModal()"><i class="fas fa-plus"></i> 创建订单</button><input placeholder="搜索..." v-model="orderSearch"></div>
                <div class="table-wrap"><table><thead><tr><th>订单号</th><th>客户</th><th>车辆</th><th>取车</th><th>还车</th><th>金额</th><th>状态</th><th>操作</th></tr></thead>
                <tbody><tr v-for="o in filteredOrders" :key="o.id">
                    <td><strong>{{ o.orderNo }}</strong></td><td>{{ o.customerName }}</td><td>{{ o.vehicleBrand }} {{ o.vehicleModel }}</td>
                    <td>{{ fmtTime(o.pickupTime) }}</td><td>{{ fmtTime(o.returnTime) }}</td>
                    <td>¥{{ o.finalAmount||o.totalAmount||0 }}</td>
                    <td><span class="badge" :class="orderStatusClass(o.status)">{{ orderStatusLabel(o.status) }}</span></td>
                    <td style="display:flex;gap:3px;">
                        <button v-if="o.status==='PENDING'" class="btn btn-xs btn-success" @click="confirmPickup(o)">取车</button>
                        <button v-if="o.status==='PICKED_UP'" class="btn btn-xs btn-success" @click="showReturnModal(o)">还车</button>
                        <button v-if="o.status==='PENDING'" class="btn btn-xs btn-danger" @click="cancelOrder(o)">取消</button>
                        <button v-if="o.status==='RETURNED'" class="btn btn-xs btn-warning" @click="showMarkAbnormal(o)">标记异常</button>
                    </td>
                </tr></tbody></table></div>
            </template>

            <!-- ====== Violations ====== -->
            <template v-if="page==='violations'">
                <div class="toolbar"><button class="btn btn-primary" @click="openViolationModal()"><i class="fas fa-plus"></i> 新增违章</button><input placeholder="搜索..." v-model="violSearch"></div>
                <div class="table-wrap"><table><thead><tr><th>订单号</th><th>客户</th><th>车牌</th><th>时间</th><th>地点</th><th>扣分</th><th>罚款</th><th>状态</th><th>操作</th></tr></thead>
                <tbody><tr v-for="v in filteredViolations" :key="v.id">
                    <td>{{ v.orderNo }}</td><td>{{ v.customerName }}</td><td>{{ v.vehiclePlate }}</td><td>{{ fmtTime(v.violationTime) }}</td><td>{{ v.location }}</td>
                    <td style="color:var(--danger);font-weight:600;">{{ v.points }}分</td><td>¥{{ v.fineAmount }}</td>
                    <td><span class="badge" :class="v.status==='RESOLVED'?'badge-green':'badge-amber'">{{ v.status==='RESOLVED'?'已处理':'待处理' }}</span></td>
                    <td><button v-if="v.status==='PENDING'" class="btn btn-xs btn-success" @click="resolveViolation(v)">处理完成</button></td>
                </tr></tbody></table></div>
            </template>

            <!-- ====== Statistics ====== -->
            <template v-if="page==='stats'">
                <div class="stat-grid">
                    <div class="stat-card"><div class="stat-icon" style="background:#eff6ff;color:var(--primary);">📋</div><div class="stat-info"><div class="stat-val">{{ dash.orders }}</div><div class="stat-lbl">总订单量</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#fef3c7;color:var(--warning);">💰</div><div class="stat-info"><div class="stat-val">¥{{ dash.revenue.toLocaleString() }}</div><div class="stat-lbl">总收入</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#f0fdf4;color:var(--success);">📈</div><div class="stat-info"><div class="stat-val">¥{{ Math.round(dash.revenue*0.3).toLocaleString() }}</div><div class="stat-lbl">预估利润</div></div></div>
                    <div class="stat-card"><div class="stat-icon" style="background:#f5f3ff;color:#7c3aed;">🚗</div><div class="stat-info"><div class="stat-val">{{ dash.activeVehicles }}</div><div class="stat-lbl">可用车辆</div></div></div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                    <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;"><h4 style="font-size:.875rem;margin-bottom:.5rem;">📈 订单收入趋势</h4><div id="chartLine" style="height:260px;"></div></div>
                    <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1rem;"><h4 style="font-size:.875rem;margin-bottom:.5rem;">🚗 车辆出租率</h4><div id="chartGauge" style="height:260px;"></div></div>
                </div>
            </template>

            <!-- ====== Users ====== -->
            <template v-if="page==='users'">
                <div class="toolbar"><button class="btn btn-primary" @click="openUserModal()"><i class="fas fa-user-plus"></i> 新增账号</button><input placeholder="搜索..." v-model="userSearch"></div>
                <div class="table-wrap"><table><thead><tr><th>用户名</th><th>姓名</th><th>手机号</th><th>角色</th><th>状态</th><th>最后登录</th><th>操作</th></tr></thead>
                <tbody><tr v-for="u in filteredUsers" :key="u.id">
                    <td><strong>{{ u.username }}</strong></td><td>{{ u.realName }}</td><td>{{ u.phone }}</td>
                    <td><span class="badge" :class="u.role==='SUPER'?'badge-red':u.role==='ADMIN'?'badge-blue':'badge-gray'">{{ roleLabel(u.role) }}</span></td>
                    <td><span class="badge" :class="u.status===1?'badge-green':'badge-gray'">{{ u.status===1?'启用':'禁用' }}</span></td>
                    <td>{{ fmtTime(u.lastLoginTime) }}</td>
                    <td style="display:flex;gap:3px;">
                        <button class="btn btn-xs btn-primary" @click="openUserModal(u)">编辑</button>
                        <button class="btn btn-xs btn-warning" @click="resetUserPwd(u)">重置密码</button>
                        <button class="btn btn-xs btn-outline" @click="showUserLog(u)">日志</button>
                        <button class="btn btn-xs btn-danger" @click="deleteUser(u)">删除</button>
                    </td>
                </tr></tbody></table></div>
            </template>

            <!-- ====== Config ====== -->
            <template v-if="page==='config'">
                <div style="background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;max-width:640px;">
                    <h3 style="margin-bottom:1rem;">⚙️ 系统参数配置</h3>
                    <div class="form-row"><div class="form-group"><label class="form-label">日租金上限</label><input class="form-input" type="number" v-model="cfg.maxDailyPrice"></div><div class="form-group"><label class="form-label">押金比例</label><input class="form-input" type="number" step="0.01" v-model="cfg.depositRatio"></div></div>
                    <div class="form-row"><div class="form-group"><label class="form-label">超时费率 (元/时)</label><input class="form-input" type="number" v-model="cfg.overtimeRate"></div><div class="form-group"><label class="form-label">违章保证金</label><input class="form-input" type="number" v-model="cfg.violationDeposit"></div></div>
                    <div class="form-actions"><button class="btn btn-outline" @click="loadConfig">恢复</button><button class="btn btn-primary" @click="saveConfig">保存配置</button></div>
                </div>
            </template>

        </div>
    </div>

    <!-- Modal -->
    <div class="modal-mask" v-if="modal.show" @click.self="modal.show=false">
        <div class="modal-box"><component :is="modal.component" v-bind="modal.props" @close="modal.show=false" @done="onModalDone"></component></div>
    </div>
    <div class="toast" :style="{background:toast.bg}" v-if="toast.show">{{ toast.msg }}</div>
</div><!-- end #app -->

<script>
function logout() { sessionStorage.clear(); window.location.href = '/login.html'; }

// 侧边栏切换 (在 Vue 外部)
function switchSidebar(el) {

// 时钟
setInterval(() => { const el = document.getElementById('topTime'); if(el) el.textContent = new Date().toLocaleString('zh-CN'); }, 1000);
(function initSidebar() {

    document.getElementById('sideName').textContent = u.realName||u.username;

<script>
const { createApp, ref, reactive, computed, watch, onMounted, nextTick, defineComponent } = Vue;

// ====== API ======
const API = '';
async function $get(u){ const r=await fetch(API+u); return r.json(); }
async function $post(u,b){ const r=await fetch(API+u,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}); return r.json(); }
async function $put(u,b){ const r=await fetch(API+u,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}); return r.json(); }
async function $del(u){ const r=await fetch(API+u,{method:'DELETE'}); return r.json(); }

// ====== Status maps ======
const VEHICLE_STATUS = { AVAILABLE:'可用', RENTED:'已租', REPAIR:'维修中', OFFLINE:'下架' };
const ORDER_STATUS = { PENDING:'待取车', PICKED_UP:'已取车', RETURNED:'已还车', CANCELLED:'已取消', COMPLETED:'已完成' };
const ROLE_MAP = { SUPER:'系统管理员', ADMIN:'管理员', NORMAL:'普通用户', CUSTOMER:'注册客户' };

function statusClass(s) { return { AVAILABLE:'badge-green', RENTED:'badge-blue', REPAIR:'badge-amber', OFFLINE:'badge-gray' }[s]||'badge-gray'; }
function statusLabel(s) { return VEHICLE_STATUS[s]||s; }
function orderStatusClass(s) { return { PENDING:'badge-amber', PICKED_UP:'badge-blue', RETURNED:'badge-green', CANCELLED:'badge-red', COMPLETED:'badge-green' }[s]||'badge-gray'; }
function orderStatusLabel(s) { return ORDER_STATUS[s]||s; }
function roleLabel(r) { return ROLE_MAP[r]||r; }
function fmtTime(t) { if(!t) return '-'; return t.replace('T',' ').substring(0,16); }

// ====== Vehicle Modal ======
const VehicleModal = defineComponent({
    props: { vehicle: Object },
    emits: ['close','done'],
    setup(props, { emit }) {
        const isEdit = !!props.vehicle;
        const form = reactive({
            brand: props.vehicle?.brand||'', model: props.vehicle?.model||'', plateNumber: props.vehicle?.plateNumber||'',
            color: props.vehicle?.color||'', seatCount: props.vehicle?.seatCount||5, dailyPrice: props.vehicle?.dailyPrice||'',
            status: props.vehicle?.status||'AVAILABLE', parkingSpot: props.vehicle?.parkingSpot||'',
            parkingTime: props.vehicle?.parkingTime ? props.vehicle.parkingTime.replace(' ','T').substring(0,16) : '',
            imageUrls: props.vehicle?.imageUrls||'', description: props.vehicle?.description||''
        });
        const uploading = ref(false);
        async function submit() {
            if (!form.brand || !form.model || !form.plateNumber) { alert('请填写品牌、型号、车牌'); return; }
            form.seatCount = parseInt(form.seatCount)||5; form.dailyPrice = parseFloat(form.dailyPrice)||0;
            if (form.parkingTime) form.parkingTime = form.parkingTime + ':00';
            let r;
            if (isEdit) { r = await $put('/api/vehicle/edit/'+props.vehicle.id, form); }
            else { r = await $post('/api/vehicle/add', form); }
            if (r.code===200) { emit('done'); emit('close'); } else { alert(r.msg||'操作失败'); }
        }
        return { isEdit, form, uploading, submit };
    },
    template: `
        <div><h3>{{ isEdit ? '✏️ 编辑车辆' : '🚗 新增车辆' }}</h3>
        <div class="form-row"><div class="form-group"><label class="form-label">品牌<span style="color:red">*</span></label><input class="form-input" v-model="form.brand" placeholder="丰田"></div><div class="form-group"><label class="form-label">型号<span style="color:red">*</span></label><input class="form-input" v-model="form.model" placeholder="凯美瑞"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">车牌<span style="color:red">*</span></label><input class="form-input" v-model="form.plateNumber" placeholder="粤A·88888"></div><div class="form-group"><label class="form-label">颜色</label><input class="form-input" v-model="form.color"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">座位数</label><input class="form-input" type="number" v-model="form.seatCount"></div><div class="form-group"><label class="form-label">日租金<span style="color:red">*</span></label><input class="form-input" type="number" step="0.01" v-model="form.dailyPrice"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">状态</label><select class="form-select" v-model="form.status"><option value="AVAILABLE">可用</option><option value="RENTED">已租</option><option value="REPAIR">维修中</option><option value="OFFLINE">下架</option></select></div><div class="form-group"><label class="form-label">车位</label><input class="form-input" v-model="form.parkingSpot" placeholder="A-01"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">入库时间</label><input class="form-input" type="datetime-local" v-model="form.parkingTime"></div><div class="form-group"><label class="form-label">图片URL</label><input class="form-input" v-model="form.imageUrls" placeholder="逗号分隔"></div></div>
        <div class="form-group"><label class="form-label">描述</label><textarea class="form-textarea" v-model="form.description"></textarea></div>
        <div class="form-actions"><button class="btn btn-outline" @click="$emit('close')">取消</button><button class="btn btn-primary" @click="submit">{{ isEdit?'保存':'新增' }}</button></div></div>`
});

// ====== Customer Modal ======
const CustomerModal = defineComponent({
    props: { customer: Object }, emits: ['close','done'],
    setup(props, { emit }) {
        const isEdit = !!props.customer;
        const form = reactive({ name: props.customer?.name||'', phone: props.customer?.phone||'', idCard: props.customer?.idCard||'', license: props.customer?.license||'', remark: props.customer?.remark||'' });
        async function submit() {
            if (!form.name || !form.phone) { alert('请填写姓名和手机号'); return; }
            let r;
            if (isEdit) { r = await $put('/api/customer/edit/'+props.customer.id, form); }
            else { r = await $post('/api/customer/add', form); }
            if (r.code===200) { emit('done'); emit('close'); } else { alert(r.msg||'操作失败'); }
        }
        return { isEdit, form, submit };
    },
    template: `
        <div><h3>{{ isEdit ? '✏️ 编辑客户' : '👤 新增客户' }}</h3>
        <div class="form-row"><div class="form-group"><label class="form-label">姓名<span style="color:red">*</span></label><input class="form-input" v-model="form.name"></div><div class="form-group"><label class="form-label">手机号<span style="color:red">*</span></label><input class="form-input" v-model="form.phone"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">身份证</label><input class="form-input" v-model="form.idCard"></div><div class="form-group"><label class="form-label">驾驶证</label><input class="form-input" v-model="form.license"></div></div>
        <div class="form-group"><label class="form-label">备注</label><textarea class="form-textarea" v-model="form.remark"></textarea></div>
        <div class="form-actions"><button class="btn btn-outline" @click="$emit('close')">取消</button><button class="btn btn-primary" @click="submit">{{ isEdit?'保存':'新增' }}</button></div></div>`
});

// ====== User Modal ======
const UserModal = defineComponent({
    props: { user: Object }, emits: ['close','done'],
    setup(props, { emit }) {
        const isEdit = !!props.user;
        const form = reactive({ username: props.user?.username||'', password: '', realName: props.user?.realName||'', phone: props.user?.phone||'', email: props.user?.email||'', role: props.user?.role||'NORMAL', status: props.user?.status??1 });
        async function submit() {
            if (!form.username || (!isEdit && !form.password)) { alert('请填写必填项'); return; }
            const data = {...form}; data.status = parseInt(data.status);
            let r;
            if (isEdit) { r = await $put('/api/user/edit/'+props.user.id, data); }
            else { r = await $post('/api/user/add', data); }
            if (r.code===200) { emit('done'); emit('close'); } else { alert(r.msg||'操作失败'); }
        }
        return { isEdit, form, submit };
    },
    template: `
        <div><h3>{{ isEdit ? '✏️ 编辑用户' : '👤 新增用户' }}</h3>
        <div class="form-row"><div class="form-group"><label class="form-label">用户名<span style="color:red">*</span></label><input class="form-input" v-model="form.username"></div><div class="form-group"><label class="form-label">{{isEdit?'新密码(留空不修改)':'密码'}}<span v-if="!isEdit" style="color:red">*</span></label><input class="form-input" type="password" v-model="form.password"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">姓名</label><input class="form-input" v-model="form.realName"></div><div class="form-group"><label class="form-label">手机号</label><input class="form-input" v-model="form.phone"></div></div>
        <div class="form-row"><div class="form-group"><label class="form-label">角色</label><select class="form-select" v-model="form.role"><option value="NORMAL">普通用户</option><option value="ADMIN">管理员</option><option value="SUPER">超级管理员</option></select></div><div class="form-group"><label class="form-label">状态</label><select class="form-select" v-model.number="form.status"><option :value="1">启用</option><option :value="0">禁用</option></select></div></div>
        <div class="form-actions"><button class="btn btn-outline" @click="$emit('close')">取消</button><button class="btn btn-primary" @click="submit">{{ isEdit?'保存':'新增' }}</button></div></div>`
});

// ====== Main App ======
createApp({
    components: { VehicleModal, CustomerModal, UserModal },
    setup() {
        const user = reactive({ name: '', avatar: 'A', role: '', roleLabel: '' });
        const page = ref('dashboard');
        window.__vuePage = page;  // 暴露给侧边栏原生JS切换
        const toast = reactive({ show: false, msg: '', bg: '#16a34a' });
        const modal = reactive({ show: false, component: null, props: {} });
        const viewMode = ref('list');

        // Data
        const vehicles = ref([]); const customers = ref([]); const orders = ref([]); const violations = ref([]); const usersList = ref([]);
        const dash = reactive({ orders: 0, revenue: 0, activeVehicles: 0, customers: 0 });
        const cfg = reactive({ maxDailyPrice: 1000, depositRatio: 0.3, overtimeRate: 50, violationDeposit: 500 });
        const vehicleSearch = ref(''); const customerSearch = ref(''); const orderSearch = ref(''); const violSearch = ref(''); const userSearch = ref('');

        // Init
        onMounted(async () => {
            const u = JSON.parse(sessionStorage.getItem('user')||'{}');
            if (!u.username) { window.location.href = '/login.html'; return; }
            user.name = u.realName||u.username; user.avatar = (u.realName||u.username)[0]; user.role = u.role; user.roleLabel = ROLE_MAP[u.role]||u.role;
            await loadAll();
            document.getElementById('topTime').textContent = new Date().toLocaleString('zh-CN');
            document.getElementById('breadcrumbTitle').textContent = '数据看板';
            watch(page, async p => {
                document.getElementById('breadcrumbTitle').textContent = pageTitle.value;
                await nextTick();
                if (p==='dashboard') renderCharts();
                if (p==='stats') renderStatsCharts();
            });
            nextTick(() => renderCharts());
        });

        async function loadAll() {
            try { const r=await $get('/api/vehicle/list'); if(r.code===200) vehicles.value=r.data.map(v=>({...v,_img: v.imageUrls?v.imageUrls.split(',')[0].trim():null})); } catch{}
            try { const r=await $get('/api/customer/list'); if(r.code===200) customers.value=r.data; } catch{}
            try { const r=await $get('/api/order/list'); if(r.code===200) orders.value=r.data; } catch{}
            try { const r=await $get('/api/violation/list'); if(r.code===200) violations.value=r.data; } catch{}
            try { const r=await $get('/api/user/list'); if(r.code===200) usersList.value=r.data; } catch{}
            try { const r=await $get('/api/statistics/overview'); if(r.code===200&&r.data){ dash.orders=r.data.totalOrders||0; dash.revenue=Number(r.data.totalRevenue||0); dash.activeVehicles=r.data.activeVehicles||0; dash.customers=r.data.totalCustomers||0; } } catch{}
            try { const r=await $get('/api/config/map'); if(r.code===200&&r.data){ cfg.maxDailyPrice=r.data.maxDailyPrice||1000; cfg.depositRatio=r.data.depositRatio||0.3; cfg.overtimeRate=r.data.overtimeRate||50; cfg.violationDeposit=r.data.violationDeposit||500; } } catch{}
        }

        function showToast(msg, bg) { toast.msg=msg; toast.bg=bg||'#16a34a'; toast.show=true; setTimeout(()=>toast.show=false,2500); }

        // Modals
        function openVehicleModal(v) { modal.props = { vehicle: v||null }; modal.component = 'VehicleModal'; modal.show = true; }
        function openCustomerModal(c) { modal.props = { customer: c||null }; modal.component = 'CustomerModal'; modal.show = true; }
        function openUserModal(u) { modal.props = { user: u||null }; modal.component = 'UserModal'; modal.show = true; }
        function onModalDone() { modal.show = false; loadAll(); showToast('操作成功'); }

        // Vehicle actions
        async function setRepair(v) { const r=prompt('维修原因:'); if(!r) return; const e=prompt('预计完成时间(yyyy-MM-dd HH:mm):'); if(!e) return; await $post('/api/vehicle/repair?id='+v.id+'&reason='+encodeURIComponent(r)+'&expectedTime='+encodeURIComponent(e+':00')); loadAll(); showToast('已设为维修'); }
        async function completeRepair(v) { await $post('/api/vehicle/repairComplete/'+v.id); loadAll(); showToast('维修完成'); }
        async function exportVehicles() { const r=await $get('/api/vehicle/export'); showToast(r.code===200?'导出成功':'导出失败', r.code===200?'#16a34a':'#dc2626'); }

        // Customer
        async function showAddPoints(c) { const p=prompt('增加积分数:', '10'); if(p&&parseInt(p)>0) { await $post('/api/customer/addPoints/'+c.id+'?points='+p); loadAll(); showToast('积分已增加'); } }
        async function toggleBlacklist(c, bl) {
            if (bl) { const r=prompt('加入黑名单原因:'); if(r) { await $post('/api/customer/blacklist/'+c.id+'?reason='+encodeURIComponent(r)); loadAll(); showToast('已加入黑名单','#dc2626'); } }
            else { await $post('/api/customer/unblacklist/'+c.id); loadAll(); showToast('已移出黑名单'); }
        }

        // Orders
        async function openOrderModal() {
            const custs = customers.value, vehs = vehicles.value.filter(v=>v.status==='AVAILABLE');
            const cid = prompt('选择客户ID:\n'+custs.map(c=>c.id+' '+c.name+' '+c.phone).join('\n'));
            if(!cid) return;
            const vid = prompt('选择车辆ID:\n'+vehs.map(v=>v.id+' '+v.brand+' '+v.model+' ¥'+v.dailyPrice).join('\n'));
            if(!vid) return;
            const p = prompt('取车时间(yyyy-MM-ddTHH:mm):', new Date().toISOString().substring(0,16));
            if(!p) return;
            const r = prompt('还车时间(yyyy-MM-ddTHH:mm):');
            if(!r) return;
            const res = await $post('/api/order/create', { customerId: parseInt(cid), vehicleId: parseInt(vid), pickupTime: p+':00', returnTime: r+':00', remark: '' });
            if (res.code===200) { loadAll(); showToast('订单创建成功'); } else { alert(res.msg); }
        }
        async function confirmPickup(o) { await $post('/api/order/pickup/'+o.id); loadAll(); showToast('取车确认成功'); }
        async function showReturnModal(o) { const t=prompt('实际还车时间(yyyy-MM-ddTHH:mm):', new Date().toISOString().substring(0,16)); if(!t) return; const c=prompt('车况描述:','完好'); if(!c) return; await $post('/api/order/return?orderId='+o.id+'&actualReturnTime='+encodeURIComponent(t+':00')+'&carCondition='+encodeURIComponent(c)); loadAll(); showToast('还车成功'); }
        async function cancelOrder(o) { const r=prompt('取消原因:'); if(!r) return; await $post('/api/order/cancel/'+o.id+'?reason='+encodeURIComponent(r)); loadAll(); showToast('订单已取消'); }
        async function showMarkAbnormal(o) { const t=prompt('异常类型(车辆损坏/违章未处理/逾期未还/其他):'); if(!t) return; const r=prompt('备注:'); if(!r) return; await $post('/api/order/markAbnormal?orderId='+o.id+'&type='+encodeURIComponent(t)+'&remark='+encodeURIComponent(r)); loadAll(); showToast('已标记异常'); }

        // Violations
        async function openViolationModal() {
            const no=prompt('订单号:'), cn=prompt('客户姓名:'), vp=prompt('车牌号:'), t=prompt('违章时间(yyyy-MM-ddTHH:mm):'), l=prompt('地点:'), p=parseInt(prompt('扣分:','0'))||0, f=parseFloat(prompt('罚款金额:','0'))||0;
            if(!no||!cn||!vp||!t) return;
            await $post('/api/violation/add',{orderNo:no,customerName:cn,vehiclePlate:vp,violationTime:t+':00',location:l||'',points:p,fineAmount:f,remark:''}); loadAll(); showToast('违章记录已创建');
        }
        async function resolveViolation(v) { const u=JSON.parse(sessionStorage.getItem('user')||'{}'); await $post('/api/violation/resolve/'+v.id+'?resolver='+encodeURIComponent(u.realName||u.username||'管理员')); loadAll(); showToast('已标记处理完成'); }

        // Users
        async function resetUserPwd(u) { const r=await $post('/api/user/resetPassword/'+u.id); showToast(r.code===200?(r.msg||'密码已重置'):(r.msg||'操作失败'), r.code===200?'#16a34a':'#dc2626'); }
        async function showUserLog(u) { const r=await $get('/api/user/logs/'+u.id); if(r.code===200){ alert('最后登录: '+(r.data.lastLoginTime||'无')+'\n登录IP: '+(r.data.lastLoginIp||'无')); } }
        async function deleteUser(u) { if(confirm('确定删除账号「'+u.username+'」?')){ const r=await $del('/api/user/delete/'+u.id); if(r.code===200) { loadAll(); showToast('已删除'); } } }

        // Config
        async function loadConfig() { const r=await $get('/api/config/map'); if(r.code===200){ cfg.maxDailyPrice=r.data.maxDailyPrice||1000; cfg.depositRatio=r.data.depositRatio||0.3; cfg.overtimeRate=r.data.overtimeRate||50; cfg.violationDeposit=r.data.violationDeposit||500; } }
        async function saveConfig() { await $post('/api/config/saveBatch', cfg); showToast('配置已保存'); }

        // Charts
        function renderCharts() { renderPie(); renderBar(); }
        function renderPie() {
            const el = document.getElementById('chartPie'); if(!el) return;
            const c = echarts.init(el); const sc = {}; vehicles.value.forEach(v=>{ const s=v.status||'UNKNOWN'; sc[s]=(sc[s]||0)+1; });
            c.setOption({ tooltip:{trigger:'item'}, series:[{ type:'pie', radius:['45%','70%'], center:['50%','45%'], label:{formatter:'{b}\n{d}%'},
                data: Object.entries(VEHICLE_STATUS).map(([k,v])=>({name:v,value:sc[k]||0})) }],
                color:['#16a34a','#2563eb','#d97706','#94a3b8'] });
        }
        function renderBar() {
            const el = document.getElementById('chartBar'); if(!el) return;
            const c = echarts.init(el); const bc = {}; vehicles.value.forEach(v=>{ const b=v.brand||'未知'; bc[b]=(bc[b]||0)+1; });
            const sorted = Object.entries(bc).sort((a,b)=>b[1]-a[1]).slice(0,10);
            c.setOption({ tooltip:{trigger:'axis'}, grid:{left:'3%',right:'5%',bottom:'3%',containLabel:true}, xAxis:{type:'category',data:sorted.map(s=>s[0]),axisLabel:{rotate:30,fontSize:10}}, yAxis:{type:'value'}, series:[{type:'bar',data:sorted.map(s=>s[1]),itemStyle:{borderRadius:[6,6,0,0],color: new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#2563eb'},{offset:1,color:'#93c5fd'}])}}] });
        }
        function renderStatsCharts() {
            nextTick(()=>{
                const el1=document.getElementById('chartLine'), el2=document.getElementById('chartGauge');
                if(el1) {
                    const dr={}; orders.value.forEach(o=>{ const d=(o.createTime||o.pickupTime||'').substring(0,10); if(d) dr[d]=(dr[d]||0)+(Number(o.finalAmount||o.totalAmount||0)); });
                    const dates=Object.keys(dr).sort().slice(-14);
                    const c=echarts.init(el1); c.setOption({ tooltip:{trigger:'axis'}, grid:{left:'3%',right:'4%',bottom:'3%',containLabel:true}, xAxis:{type:'category',data:dates,axisLabel:{rotate:30,fontSize:10}}, yAxis:{type:'value'}, series:[{type:'line',data:dates.map(d=>dr[d]),smooth:true,areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(37,99,235,.3)'},{offset:1,color:'rgba(37,99,235,.02)'}]}}}] });
                }
                if(el2) {
                    const sc={}; vehicles.value.forEach(v=>{ const s=v.status||'UNKNOWN'; sc[s]=(sc[s]||0)+1; });
                    const total=Object.values(sc).reduce((a,b)=>a+b,0)||1;
                    const c=echarts.init(el2); c.setOption({ series:[{ type:'gauge', startAngle:210, endAngle:-30, center:['50%','55%'], radius:'85%', min:0, max:100,
                        progress:{show:true,width:16,itemStyle:{color:{type:'linear',x:0,y:0,x2:1,y2:0,colorStops:[{offset:0,color:'#16a34a'},{offset:.5,color:'#d97706'},{offset:1,color:'#dc2626'}]}}},
                        axisLine:{lineStyle:{width:16,color:[[.4,'#16a34a'],[.7,'#d97706'],[1,'#dc2626']]}}, detail:{valueAnimation:true,formatter:'{value}%',fontSize:24,fontWeight:'bold'},
                        data:[{value:Math.round((sc['RENTED']||0)/total*100),name:'出租率'}] }] });
                }
            });
        }

        // Computed filters
        const filteredVehicles = computed(() => { const s=vehicleSearch.value.toLowerCase(); return vehicles.value.filter(v=> !s||(v.brand+v.model+v.plateNumber).toLowerCase().includes(s)); });
        const filteredCustomers = computed(() => { const s=customerSearch.value.toLowerCase(); return customers.value.filter(c=> !s||(c.name+c.phone).toLowerCase().includes(s)); });
        const filteredOrders = computed(() => { const s=orderSearch.value.toLowerCase(); return orders.value.filter(o=> !s||(o.orderNo+o.customerName+o.vehiclePlate).toLowerCase().includes(s)); });
        const filteredViolations = computed(() => { const s=violSearch.value.toLowerCase(); return violations.value.filter(v=> !s||(v.orderNo+v.customerName+v.vehiclePlate).toLowerCase().includes(s)); });
        const filteredUsers = computed(() => { const s=userSearch.value.toLowerCase(); return usersList.value.filter(u=> !s||(u.username+u.realName+u.phone).toLowerCase().includes(s)); });

        const pageTitle = computed(() => ({ dashboard:'数据看板', vehicles:'车辆管理', customers:'客户管理', orders:'订单管理', violations:'违章管理', stats:'统计报表', users:'用户管理', config:'系统配置' })[page.value]||'');

        return { user, page, toast, modal, viewMode, vehicles, customers, orders, violations, usersList, dash, cfg,
            vehicleSearch, customerSearch, orderSearch, violSearch, userSearch,
            pageTitle, filteredVehicles, filteredCustomers, filteredOrders, filteredViolations, filteredUsers,
            statusClass, statusLabel, orderStatusClass, orderStatusLabel, roleLabel, fmtTime,
            openVehicleModal, openCustomerModal, openUserModal, onModalDone,
            setRepair, completeRepair, exportVehicles,
            showAddPoints, toggleBlacklist,
            openOrderModal, confirmPickup, showReturnModal, cancelOrder, showMarkAbnormal,
            openViolationModal, resolveViolation,
            resetUserPwd, showUserLog, deleteUser,
            loadConfig, saveConfig };
    }
}).mount('#app');
</script>
</body>
</html>
