<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>车辆详情 - 爱租车</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/business.css">
    <style>
        .gallery-main{width:100%;height:360px;background:var(--surface);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:4rem;background-size:cover;background-position:center}
        .spec-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
        .spec-item{border-bottom:1px solid var(--line);padding-bottom:.75rem;display:flex;justify-content:space-between}
        .spec-item .key{color:var(--muted);font-size:.875rem}.spec-item .val{font-weight:600}
        .price-tag{font-size:2rem;font-weight:800;color:var(--danger)}
        .price-tag small{font-size:1rem;font-weight:400;color:var(--muted)}
        .status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
        .status-dot.available{background:var(--success)}.status-dot.rented{background:var(--danger)}
    </style>
</head>
<body>
<header class="navbar">
    <a href="home.html" class="brand"><span class="dot"></span>爱租车</a>
    <nav>
        <a href="home.html">首页</a><a href="home.html#services">服务</a><a href="home.html#fleet">车型</a>
        <a href="about.html">关于</a><a href="contact.html">联系</a>
        <a href="login.html" class="btn-sm btn-outline">登录</a><a href="register.html" class="btn-sm btn-filled">注册</a>
    </nav>
</header>

<section class="page-hero" style="padding-bottom:2rem;"><div class="container">
    <div class="section-label">Vehicle Details</div>
    <h1 id="vTitle">加载中...</h1>
    <p id="vSub"></p>
</div></section>

<section class="section" style="padding-top:0;"><div class="container">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;">
        <div>
            <div class="gallery-main" id="vImage">🚗</div>
        </div>
        <div>
            <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;">
                <span class="tag tag-blue" id="vStatus">状态</span>
                <span class="tag tag-amber" id="vParking">车位</span>
            </div>
            <div class="price-tag" id="vPrice">¥--<small>/日</small></div>
            <p class="text-sm text-muted" style="margin:1rem 0;" id="vDesc"></p>
            <div class="spec-grid" id="vSpecs"></div>
            <div style="margin-top:1.5rem;display:flex;gap:.75rem;">
                <a href="register.html" class="btn btn-primary btn-lg">立即注册租车</a>
                <a href="login.html" class="btn btn-outline btn-lg">已有账号登录</a>
            </div>
        </div>
    </div>
</div></section>

<footer class="footer"><div class="container"><div class="footer-grid">
    <div><div style="font-size:1.125rem;font-weight:800;color:#fff;margin-bottom:.5rem;"><span style="color:var(--accent);">●</span> 爱租车</div><p>专业汽车租赁服务平台</p></div>
    <div><h4>快速链接</h4><a href="home.html">首页</a><a href="about.html">关于我们</a><a href="contact.html">联系我们</a></div>
    <div><h4>服务支持</h4><a href="#">租车须知</a><a href="#">保险说明</a><a href="#">违章处理</a></div>
    <div><h4>联系方式</h4><a>400-888-6688</a><a>service@aizuche.com</a><a>广州市天河区</a></div>
</div><div class="footer-bottom">© 2026 爱租车汽车租赁服务平台</div></div></footer>

<script>
(function load(){
    var id = new URLSearchParams(window.location.search).get('id');
    if (!id) { document.getElementById('vTitle').textContent = '请选择车辆'; return; }
    fetch('/api/vehicle/detail/' + id).then(r=>r.json()).then(d=>{
        if (d.code!==200) { document.getElementById('vTitle').textContent='车辆不存在'; return; }
        var v = d.data;
        var sm = {AVAILABLE:'可租用',RENTED:'已租出',REPAIR:'维修中',OFFLINE:'已下架'};
        var sc = {AVAILABLE:'available',RENTED:'rented'};
        document.getElementById('vTitle').textContent = (v.brand||'') + ' ' + (v.model||'');
        document.getElementById('vSub').textContent = v.plateNumber||'';
        document.getElementById('vStatus').innerHTML = '<span class="status-dot '+(sc[v.status]||'')+'"></span>'+(sm[v.status]||v.status);
        document.getElementById('vParking').textContent = '📍 '+(v.parkingSpot||'未入库');
        document.getElementById('vPrice').innerHTML = '¥'+(v.dailyPrice||0)+'<small>/日</small>';
        document.getElementById('vDesc').textContent = v.description||'暂无描述信息';
        document.getElementById('vSpecs').innerHTML =
            '<div class="spec-item"><span class="key">品牌</span><span class="val">'+(v.brand||'-')+'</span></div>'+
            '<div class="spec-item"><span class="key">型号</span><span class="val">'+(v.model||'-')+'</span></div>'+
            '<div class="spec-item"><span class="key">车牌号</span><span class="val">'+(v.plateNumber||'-')+'</span></div>'+
            '<div class="spec-item"><span class="key">颜色</span><span class="val">'+(v.color||'-')+'</span></div>'+
            '<div class="spec-item"><span class="key">座位数</span><span class="val">'+(v.seatCount||0)+' 座</span></div>'+
            '<div class="spec-item"><span class="key">日租金</span><span class="val">¥'+(v.dailyPrice||0)+'</span></div>';
        var img = v.imageUrls ? v.imageUrls.split(',')[0].trim() : null;
        if (img && (img.startsWith('/uploads/')||img.startsWith('http'))) {
            document.getElementById('vImage').style.backgroundImage = 'url('+img+')';
            document.getElementById('vImage').style.backgroundSize = 'cover';
            document.getElementById('vImage').textContent = '';
        }
    }).catch(function(){ document.getElementById('vTitle').textContent='加载失败'; });
})();
</script>
</body>
</html>
