<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - 爱租车</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body { background: var(--gray-100); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1.5rem; }
        .pwd-card { background: #fff; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 2.5rem; width: 100%; max-width: 420px; }
        .pwd-card .brand { text-align: center; margin-bottom: 1.5rem; }
        .pwd-card .brand i { font-size: 2.5rem; color: var(--accent); }
        .pwd-card .brand h2 { margin-top: 0.25rem; color: var(--dark); }
        .pwd-card .brand p { font-size: 0.875rem; color: var(--gray-400); }
        .alert.hidden { display: none; }
        .link-row { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--gray-400); }
        .link-row a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .link-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="pwd-card">
    <div class="brand"><i class="fas fa-key"></i><h2>找回密码</h2><p>输入用户名即可重置密码</p></div>
    <div class="alert alert-info" style="margin-bottom:1rem;"><i class="fas fa-info-circle"></i> 系统将为您生成一个新的临时密码</div>
    <div class="alert alert-error hidden" id="errorMsg"></div>
    <div class="alert alert-success hidden" id="successMsg"></div>
    <form id="forgotForm">
        <div class="form-group input-icon"><i class="fas fa-user"></i><input type="text" id="username" placeholder="输入您的用户名" required autocomplete="username"></div>
        <button type="submit" class="btn btn-accent w-full btn-lg" id="submitBtn"><i class="fas fa-paper-plane"></i> 重置密码</button>
    </form>
    <div class="link-row"><a href="login.html"><i class="fas fa-arrow-left"></i> 返回登录</a> · <a href="home.html" class="text-muted">返回首页</a></div>
</div>
<script>
const API = '';
function show(m, type) {
    const e = document.getElementById(type==='success'?'successMsg':'errorMsg');
    e.textContent = m; e.classList.remove('hidden');
    if (type==='error') document.getElementById('successMsg').classList.add('hidden');
}
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault(); const btn = document.getElementById('submitBtn');
    const username = document.getElementById('username').value.trim();
    if (!username) { show('请输入用户名','error'); return; }
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中...';
    try {
        const r = await fetch(API+'/api/forgot-password?username='+encodeURIComponent(username), { method:'POST' });
        const d = await r.json();
        if (d.code===200) { show(d.msg||'密码已重置','success'); document.getElementById('username').value=''; }
        else show(d.msg||'操作失败','error');
    } catch { show('网络连接失败','error'); }
    finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> 重置密码'; }
});
</script>
</body>
</html>
